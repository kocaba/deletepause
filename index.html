<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Pause Remover</title>
</head>
<body>

<h2>Upload video</h2>

<input type="file" id="fileInput">

<br><br>

<label>Минимальная тишина (сек):</label>
<input type="number" id="duration" value="0.5" step="0.1">

<br><br>

<label>Чувствительность (dB):</label>
<input type="number" id="threshold" value="-40">

<br><br>

<button id="processBtn">Remove pauses</button>

<br><br>

<video id="preview" controls width="400"></video>

<br><br>

<a id="downloadBtn" style="display:none;" download="output.mp4">Скачать видео</a>

<!-- FFmpeg -->
<script src="./ffmpeg/ffmpeg.min.js"></script>

<!-- твой код -->
<script src="script.js"></script>

</body>
</html>
