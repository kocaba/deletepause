<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pause Remover Pro</title>
  <style>
    :root { --primary: #2b6cff; --success: #00b894; --bg: #000; }
    
    * { box-sizing: border-box; }

    body { 
      margin: 0; font-family: -apple-system, sans-serif; background: var(--bg); 
      display: flex; justify-content: center; color: #333; min-height: 100vh;
      overflow-x: hidden; position: relative;
    }

    /* Анімований фон */
    .bg-circle {
      position: fixed; width: 600px; height: 600px;
      background: radial-gradient(circle, #1e3a8a 0%, rgba(0,0,0,0) 70%);
      border-radius: 50%; filter: blur(80px); z-index: -1;
      animation: move 12s infinite alternate ease-in-out;
    }
    @keyframes move { from { transform: translate(-20%, 10%); } to { transform: translate(70%, 60%); } }

    .app { width: 100%; max-width: 600px; padding: 20px; z-index: 1; }
    
    .card { 
      background: rgba(255, 255, 255, 0.95); border-radius: 20px; padding: 20px; 
      margin-bottom: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      width: 100%; overflow: hidden; /* Щоб нічого не вилазило */
    }

    .intro-header { text-align: center; color: white; margin-bottom: 20px; }

    /* Оверлей обробки */
    #processingOverlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.92); z-index: 1000; flex-direction: column;
      justify-content: center; align-items: center; color: white;
    }

    /* Стилізація Input File */
    .file-input-container {
      width: 100%;
      padding: 20px;
      border: 2px dashed #ccc;
      border-radius: 12px;
      text-align: center;
      background: #fff;
    }
    #fileInput { width: 100%; max-width: 100%; }

    /* Аудіодоріжка (Waveform) - робимо СІРОЮ */
    #waveform { 
      width: 100%; height: 120px; background: #fafafa; border-radius: 10px; 
      border: 1px solid #eee; display: block;
      filter: grayscale(1) contrast(1.2); /* Змушує графік бути сірим */
    }
    
    /* Відео 40% */
    .video-wrap { display: flex; justify-content: center; width: 100%; margin: 10px 0; }
    video { width: 40% !important; border-radius: 12px; background: #000; }

    /* Таби */
    .tabs { display: flex; background: #eee; border-radius: 10px; padding: 4px; margin-bottom: 15px; }
    .tab-btn { flex: 1; text-align: center; padding: 8px; cursor: pointer; border-radius: 8px; transition: 0.3s; }

    label { font-size: 14px; margin-top: 15px; display: block; font-weight: bold; }
    .slider-info { display: flex; justify-content: space-between; font-size: 13px; color: #666; margin-top: 4px; }
    input[type="range"] { width: 100%; margin-top: 8px; cursor: pointer; }

    button { width: 100%; padding: 15px; border: none; border-radius: 12px; background: var(--primary); color: white; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    
    #downloadBtn { display: none; margin-top: 12px; text-align: center; padding: 15px; background: var(--success); color: white; text-decoration: none; border-radius: 12px; font-weight: bold; }
    
    /* Приховування кроків */
    #step-2, #step-3 { display: none; }
  </style>
</head>
<body>

<div class="bg-circle"></div>

<div id="processingOverlay">
    <h2 style="color:white">Обробка відео...</h2>
    <div id="overlayPercent" style="font-size: 36px; font-weight: bold; margin: 10px;">0%</div>
    <div style="width: 80%; max-width: 400px; background: #333; height: 12px; border-radius: 6px; overflow: hidden;">
        <div id="overlayBar" style="width: 0%; height: 100%; background: var(--primary); transition: 0.2s;"></div>
    </div>
    <p id="overlayEta" style="margin-top: 15px; opacity: 0.8;">Залишилось: -- сек</p>
</div>

<div class="app">
  <div class="intro-header" id="welcome">
    <h1>Pause Remover Pro</h1>
    <p>Видаляйте паузи автоматично та швидко</p>
  </div>

  <div class="card" id="step-1">
    <h2>Завантажте відео</h2>
    <div class="file-input-container">
      <input type="file" id="fileInput" accept="video/*">
    </div>
  </div>

  <div id="step-2">
    <div class="card">
      <div class="tabs">
        <div id="tabAuto" style="flex: 1; text-align: center; padding: 8px; cursor: pointer; border-radius: 8px; background: var(--primary); color: white; font-weight: bold;">Авто</div>
        <div id="tabManual" style="flex: 1; text-align: center; padding: 8px; cursor: pointer; border-radius: 8px;">Вручную</div>
      </div>

      <div id="manualControls" style="display: none;">
        <label>Минимальная тишина</label>
        <input type="range" id="duration" min="0.1" max="2.0" step="0.05" value="0.5">
        <div class="slider-info"><span>Короткие паузи</span><span id="durationVal">0.5 сек</span></div>
        <label>Чувствительность (dB)</label>
        <input type="range" id="threshold" min="-60" max="-10" step="1" value="-35">
        <div class="slider-info"><span>Тише</span><span id="thresholdVal">-35 dB</span></div>
      </div>

      <div id="autoInfo" style="padding: 10px; font-size: 14px; background: #f0f7ff; border-radius: 10px; border: 1px solid #d0e0ff; margin-bottom: 10px;">
        ✨ Режим «Авто» підбере налаштування автоматично.
      </div>

      <label>Аналіз звуку:</label>
      <canvas id="waveform"></canvas>

      <div id="progCont" style="display:none">
          <div id="statusText">0%</div>
          <div id="progressBar" style="width:0%"></div>
          <div id="etaText"></div>
      </div>

      <button id="processBtn">Запустити обробку</button>
    </div>
  </div>

  <div id="step-3">
    <div class="card">
      <div class="video-wrap">
        <video id="preview" controls></video>
      </div>
      <a id="downloadBtn" download="no_pauses.mp4">Скачати готове відео</a>
      <button style="background:#666" onclick="location.reload()">Нове відео</button>
    </div>
  </div>
</div>

<script src="./ffmpeg/ffmpeg.min.js"></script>
<script src="script.js"></script>

<script>
  const fInput = document.getElementById('fileInput');
  const step1 = document.getElementById('step-1');
  const step2 = document.getElementById('step-2');
  const step3 = document.getElementById('step-3');
  const welcome = document.getElementById('welcome');
  const overlay = document.getElementById('processingOverlay');

  // Показ блоків після завантаження
  fInput.addEventListener('change', () => {
    if (fInput.files.length > 0) {
      step1.style.display = 'none';
      welcome.style.display = 'none';
      step2.style.display = 'block';
    }
  });

  // Оверлей при старті обробки
  document.getElementById('processBtn').onclick = () => {
    overlay.style.display = 'flex';
  };

  // Слідкуємо за прогресом для оверлею та фіналу
  const realBar = document.getElementById('progressBar');
  const realStatus = document.getElementById('statusText');
  const realEta = document.getElementById('etaText');
  const dlBtn = document.getElementById('downloadBtn');

  const observer = new MutationObserver(() => {
    // Оновлюємо дані в оверлеї
    document.getElementById('overlayBar').style.width = realBar.style.width;
    document.getElementById('overlayPercent').innerText = realStatus.innerText;
    document.getElementById('overlayEta').innerText = realEta.innerText;

    // Якщо з'явилася кнопка скачування — переходимо до фіналу
    if (window.getComputedStyle(dlBtn).display === 'block') {
      overlay.style.display = 'none';
      step2.style.display = 'none';
      step3.style.display = 'block';
    }
  });

  observer.observe(realBar, { attributes: true });
  observer.observe(realStatus, { childList: true, characterData: true, subtree: true });

  // Таби дизайну (вони працюють паралельно з логікою)
  const btnAuto = document.getElementById('tabAuto');
  const btnManual = document.getElementById('tabManual');
  
  btnAuto.addEventListener('click', () => {
    btnAuto.style.background = 'var(--primary)'; btnAuto.style.color = 'white';
    btnManual.style.background = 'none'; btnManual.style.color = '#333';
  });
  
  btnManual.addEventListener('click', () => {
    btnManual.style.background = 'var(--primary)'; btnManual.style.color = 'white';
    btnAuto.style.background = 'none'; btnAuto.style.color = '#333';
  });
</script>

</body>
</html>
