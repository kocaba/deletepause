<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Silence Remover</title>
    <style>
        :root { --accent: #007aff; --bg: #000; --card: #1c1c1e; }
        body { margin: 0; font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: #fff; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 500px; padding: 20px; box-sizing: border-box; }
        .card { background: var(--card); border-radius: 16px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        h1 { font-size: 22px; text-align: center; margin-bottom: 25px; color: var(--accent); }
        .upload-area { border: 2px dashed #3a3a3c; border-radius: 12px; padding: 40px 10px; text-align: center; cursor: pointer; transition: 0.3s; }
        .upload-area:active { background: #2c2c2e; }
        .btn { width: 100%; background: var(--accent); border: none; border-radius: 10px; padding: 15px; color: white; font-weight: 600; font-size: 16px; cursor: pointer; margin-top: 10px; }
        .btn:disabled { background: #3a3a3c; color: #8e8e93; }
        #status-log { margin-top: 15px; font-size: 12px; color: #ff453a; font-family: monospace; white-space: pre-wrap; text-align: left; }
        #ov-loading { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 100; flex-direction: column; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        canvas { width: 100%; height: 80px; background: #2c2c2e; border-radius: 8px; margin: 15px 0; }
        .hidden { display: none; }
        video { width: 100%; border-radius: 12px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="ov-loading">
    <div id="loader-pct" style="font-size: 48px; font-weight: bold;">0%</div>
    <div id="loader-msg" style="margin-top: 10px; color: #8e8e93;">Обробка...</div>
</div>

<div class="container">
    <h1>Silence Remover AI</h1>

    <div id="step-1" class="card">
        <div class="upload-area" id="drop-zone">
            <span style="font-size: 40px;">🎬</span>
            <p>Натисніть, щоб обрати відео</p>
            <input type="file" id="file-input" accept="video/*" style="display: none;">
        </div>
        <div id="status-log"></div>
    </div>

    <div id="step-2" class="card hidden">
        <p style="margin: 0; font-size: 14px; color: #8e8e93;">Аудіограма:</p>
        <canvas id="wav-canvas"></canvas>
        <button id="process-btn" class="btn">Видалити тишу</button>
    </div>

    <div id="step-3" class="card hidden">
        <video id="result-video" controls></video>
        <button id="save-btn" class="btn" style="background: #32d74b;">Зберегти результат</button>
        <button onclick="location.reload()" class="btn" style="background: transparent; color: #8e8e93;">Інше відео</button>
    </div>
</div>

<script src="./ffmpeg/ffmpeg.min.js"></script>
<script src="script.js"></script>
</body>
</html>
