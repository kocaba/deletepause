<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Pause Remover</title>

  <style>
    body {
      font-family: Arial;
      max-width: 600px;
      margin: 40px auto;
    }

    video {
      width: 100%;
      margin-top: 10px;
    }

    input, button {
      margin-top: 10px;
      width: 100%;
      padding: 8px;
    }

    #progress {
      margin-top: 10px;
      font-weight: bold;
    }

    #downloadBtn {
      display: none;
      margin-top: 10px;
      display: inline-block;
      padding: 10px;
      background: black;
      color: white;
      text-decoration: none;
    }
  </style>
</head>
<body>

<h2>Remove pauses from video</h2>

<input type="file" id="fileInput" accept="video/*">

<label>Минимальная тишина (сек):</label>
<input type="number" id="duration" value="0.3" step="0.1">

<label>Чувствительность (dB):</label>
<input type="number" id="threshold" value="-35">

<button id="processBtn">Обработать видео</button>

<div id="progress"></canvas></div>
<div id="progress2"><canvas id="waveform" width="800" height="150"></div>

<video id="preview" controls></video>

<a id="downloadBtn" download="output.mp4">Скачать видео</a>

<script src="./ffmpeg/ffmpeg.min.js"></script>
<script src="script.js"></script>

</body>
</html>
