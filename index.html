<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pause Remover Pro</title>
    <style>
        :root { --p-clr: #2b6cff; --b-clr: #050505; }
        body { margin: 0; font-family: system-ui, -apple-system, sans-serif; background: var(--b-clr); color: #fff; text-align: center; padding: 20px; }
        .card { background: #fff; border-radius: 20px; padding: 25px; color: #333; max-width: 400px; margin: 20px auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn_file { padding: 40px 10px; border: 2px dashed #ccc; border-radius: 15px; background: #f9f9f9; cursor: pointer; color: #666; font-weight: bold; }
        #ov { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; flex-direction:column; justify-content:center; align-items:center; }
        #debug_log { background: #222; color: #ff4d4d; padding: 10px; border-radius: 8px; margin-top: 20px; font-family: monospace; font-size: 12px; text-align: left; overflow-x: auto; display: none; }
        .hidden { display: none !important; }
        canvas { width: 100%; height: 80px; background: #eee; border-radius: 10px; margin: 15px 0; }
        .btn_go { width: 100%; padding: 15px; border: none; border-radius: 12px; background: var(--p-clr); color: white; font-weight: bold; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>

<div id="ov">
    <div id="msg">Завантаження...</div>
    <div id="pct" style="font-size: 40px; font-weight: 800;">0%</div>
</div>

<div id="step1" class="card">
    <h2 style="margin-top:0">Крок 1: Відео</h2>
    <div class="btn_file" onclick="document.getElementById('fin').click()">
        📁 Натисніть для вибору файлу
        <input type="file" id="fin" accept="video/*" style="display:none">
    </div>
    <div id="debug_log"></div>
</div>

<div id="step2" class="card hidden">
    <h2 style="margin-top:0">Крок 2: Налаштування</h2>
    <canvas id="cvs"></canvas>
    <button id="run" class="btn_go">Вирізати паузи</button>
</div>

<div id="step3" class="card hidden">
    <video id="v_res" controls style="width:100%; border-radius:10px;"></video>
    <button class="btn_go" style="margin-top:10px; background:#444" onclick="location.reload()">Почати заново</button>
</div>

<script src="./ffmpeg/ffmpeg.min.js"></script>
<script src="script.js"></script>
</body>
</html>
