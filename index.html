<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pause Remover Pro - Mobile Ready</title>
    <style>
        :root { --p-clr: #2b6cff; --s-clr: #00b894; --b-clr: #050505; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--b-clr); color: #fff; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            padding-top: 80px; overflow-x: hidden;
        }

        .bg_anim { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: #000; }
        .blob { position: absolute; width: 300px; height: 300px; background: radial-gradient(circle, rgba(43,108,255,0.3) 0%, rgba(0,0,0,0) 70%); border-radius: 50%; filter: blur(50px); animation: move 10s infinite alternate; }
        @keyframes move { 0% { transform: translate(-10%, -10%); } 100% { transform: translate(30%, 20%); } }

        header .f_head { width: 100%; position: fixed; top: 0; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); z-index: 100; border-bottom: 1px solid #ddd; padding: 10px 0; }
        .main_app_v3 { width: 100%; max-width: 500px; padding: 15px; z-index: 10; }
        
        .card_main { background: #fff; border-radius: 20px; padding: 20px; margin-bottom: 20px; color: #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { text-align: center; margin: 0 0 15px 0; color: var(--p-clr); font-size: 22px; }
        
        .f_inp_88 { width: 100%; padding: 40px 15px; border: 2px dashed #ccc; border-radius: 15px; text-align: center; cursor: pointer; color: #777; font-weight: bold; }
        
        #ov_scr_55 { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 200; flex-direction: column; justify-content: center; align-items: center; }
        .p_bar_bg { width: 80%; height: 8px; background: #333; border-radius: 4px; margin: 20px 0; overflow: hidden; }
        #p_bar_fill { width: 0%; height: 100%; background: var(--p-clr); transition: width 0.3s; }

        .btn_prim { width: 100%; padding: 16px; border: none; border-radius: 12px; background: var(--p-clr); color: white; font-size: 16px; font-weight: bold; cursor: pointer; }
        #wv_cvs_11 { width: 100%; height: 100px; background: #f0f0f0; border-radius: 10px; margin: 15px 0; }
        
        .hidden_node { display: none !important; }
        video { width: 100%; border-radius: 12px; background: #000; }
    </style>
</head>
<body>

<div class="bg_anim"><div class="blob"></div></div>

<header>
    <div class="f_head">
        <div style="text-align:center; font-weight:bold; color:#000;">Web<span style="color:darkblue">Progger</span> AI</div>
    </div>
</header>

<div id="ov_scr_55">
    <h2 style="color:white">Обробка відео...</h2>
    <div id="ov_pct" style="font-size: 40px; font-weight: bold; color: var(--p-clr);">0%</div>
    <div class="p_bar_bg"><div id="p_bar_fill"></div></div>
    <div style="color:#aaa; font-size:12px;">НЕ ЗАКРИВАЙТЕ ВКЛАДКУ</div>
</div>

<div class="main_app_v3">
    <div id="step_file">
        <div class="card_main">
            <h2>Pause Remover Pro</h2>
            <div class="f_inp_88" onclick="document.getElementById('real_f').click()">
                <div style="font-size:30px;">📱</div>
                Обрати відео з iPhone
                <input type="file" id="real_f" accept="video/*" style="display:none">
            </div>
        </div>
    </div>

    <div class="card_main hidden_node" id="step_editor">
        <canvas id="wv_cvs_11"></canvas>
        <div style="margin-bottom:15px; font-size:14px; color:#666;">
            Алгоритм автоматично видалить паузи, де ви мовчите або читаєте текст.
        </div>
        <button id="go_proc" class="btn_prim">Почати монтаж</button>
    </div>

    <div class="card_main hidden_node" id="step_result">
        <video id="vid_pre_77" controls playsinline></video>
        <a id="dl_btn_99" download="iphone_ready.mp4" style="display:none; text-align:center; padding:16px; background:var(--s-clr); color:white; text-decoration:none; border-radius:12px; font-weight:bold; margin: 15px 0; display:block;">Зберегти у Фото</a>
        <button class="btn_prim" style="background:#666;" onclick="location.reload()">Інше відео</button>
    </div>
</div>

<script src="https://unpkg.com/@ffmpeg/ffmpeg@0.10.1/dist/ffmpeg.min.js"></script>
<script src="script.js"></script>
</body>
</html>
