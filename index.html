<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pause Remover Pro</title>
  <style>
    :root { --primary: #2b6cff; --success: #00b894; --bg: #000; }
    
    * { box-sizing: border-box; } /* Виправляє вилізання рамок */

    body { 
      margin: 0; font-family: -apple-system, sans-serif; background: var(--bg); 
      display: flex; justify-content: center; color: #333; min-height: 100vh;
      overflow-x: hidden;
    }

    /* Анімований фон */
    .bg-circle {
      position: fixed; width: 600px; height: 600px;
      background: radial-gradient(circle, #1e3a8a 0%, rgba(0,0,0,0) 70%);
      border-radius: 50%; filter: blur(80px); z-index: -1;
      animation: move 12s infinite alternate ease-in-out;
    }
    @keyframes move { from { transform: translate(-20%, 10%); } to { transform: translate(70%, 60%); } }

    .app { width: 100%; max-width: 600px; padding: 20px; z-index: 1; }
    
    .card { 
      background: rgba(255, 255, 255, 0.95); border-radius: 20px; padding: 20px; 
      margin-bottom: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      width: 100%;
    }

    h2 { text-align: center; margin-top: 0; color: var(--primary); }

    /* Оверлей на весь екран */
    #fullOverlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.95); z-index: 9999; flex-direction: column;
      justify-content: center; align-items: center; color: white; text-align: center;
    }

    input[type="file"] { 
      width: 100%; padding: 15px; border: 2px dashed #ccc; border-radius: 12px; 
      cursor: pointer; background: white; display: block;
    }

    /* Відео 40% */
    .video-wrap { display: flex; justify-content: center; width: 100%; }
    video { width: 40% !important; border-radius: 12px; background: #000; margin: 15px 0; }

    #waveform { 
      width: 100%; height: 120px; background: #eee; border-radius: 10px; 
      border: 1px solid #ddd; display: block; 
    }
    
    button { 
      width: 100%; padding: 16px; border: none; border-radius: 14px; 
      background: var(--primary); color: white; font-size: 16px; 
      font-weight: bold; cursor: pointer; transition: 0.2s; 
    }
    
    #downloadBtn { 
      display: none; margin-top: 12px; text-align: center; padding: 16px; 
      background: var(--success); color: white; text-decoration: none; 
      border-radius: 14px; font-weight: bold; 
    }

    /* Допоміжні класи */
    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="bg-circle"></div>

<div id="fullOverlay">
    <h2 style="color:white">Обробка відео...</h2>
    <div id="ovPercent" style="font-size: 48px; font-weight: bold; color: var(--primary);">0%</div>
    <div style="width: 80%; max-width: 400px; background: #222; height: 12px; border-radius: 6px; overflow: hidden; margin: 20px 0;">
        <div id="ovBar" style="width: 0%; height: 100%; background: var(--primary); transition: 0.3s;"></div>
    </div>
    <div id="ovEta" style="opacity: 0.7;">Залишилось: -- сек</div>
</div>

<div class="app">
  <div class="card" id="cardUpload">
    <h2>Remove Pauses</h2>
    <input type="file" id="fileInput" accept="video/*">
  </div>

  <div class="card hidden" id="cardEditor">
    <div style="display: flex; background: #eee; border-radius: 10px; padding: 4px; margin-bottom: 15px;">
      <div id="tabAuto" style="flex: 1; text-align: center; padding: 8px; cursor: pointer; border-radius: 8px; background: var(--primary); color: white; font-weight: bold;">Авто</div>
      <div id="tabManual" style="flex: 1; text-align: center; padding: 8px; cursor: pointer; border-radius: 8px;">Вручную</div>
    </div>

    <div id="manualControls" style="display: none;">
      <label>Минимальная тишина</label>
      <input type="range" id="duration" min="0.1" max="2.0" step="0.05" value="0.5">
      <div style="display:flex; justify-content:space-between; font-size:12px"><span>Короткі</span><span id="durationVal">0.5 сек</span></div>
      
      <label>Чувствительность (dB)</label>
      <input type="range" id="threshold" min="-60" max="-10" step="1" value="-35">
      <div style="display:flex; justify-content:space-between; font-size:12px"><span>Тихіше</span><span id="thresholdVal">-35 dB</span></div>
    </div>

    <div id="autoInfo" style="padding: 10px; font-size: 14px; background: #f0f7ff; border-radius: 10px; margin-bottom: 10px; border: 1px solid #d0e0ff;">
      ✨ Режим «Авто» підбере налаштування автоматично.
    </div>

    <label>Аналіз звуку:</label>
    <canvas id="waveform"></canvas>

    <div id="progCont" class="hidden">
      <div id="statusText">0%</div>
      <div id="progressBar" style="width:0%"></div>
      <div id="etaText"></div>
    </div>

    <button id="processBtn" style="margin-top: 15px;">Запустити обробку</button>
  </div>

  <div class="card hidden" id="cardResult">
    <h2>Готово!</h2>
    <div class="video-wrap">
      <video id="preview" controls></video>
    </div>
    <a id="downloadBtn" download="no_pauses.mp4">Скачати готове відео</a>
    <button style="background:#555; margin-top:10px;" onclick="location.reload()">Нове відео</button>
  </div>
</div>

<script src="./ffmpeg/ffmpeg.min.js"></script>
<script src="script.js"></script>

<script>
  // Елементи інтерфейсу
  const fileInput = document.getElementById('fileInput');
  const cardUpload = document.getElementById('cardUpload');
  const cardEditor = document.getElementById('cardEditor');
  const cardResult = document.getElementById('cardResult');
  const overlay = document.getElementById('fullOverlay');

  // Елементи твого скрипта для спостереження
  const realBar = document.getElementById('progressBar');
  const realStatus = document.getElementById('statusText');
  const realEta = document.getElementById('etaText');
  const dlBtn = document.getElementById('downloadBtn');

  // 1. Коли вибрав файл - показуємо редактор
  fileInput.addEventListener('change', () => {
    if (fileInput.files.length > 0) {
      cardUpload.classList.add('hidden');
      cardEditor.classList.remove('hidden');
    }
  });

  // 2. Спостерігаємо за процесом
  const observer = new MutationObserver(() => {
    const pct = realBar.style.width;
    
    // Показуємо оверлей тільки якщо йде реальна обробка (від 1% до 99%)
    if (pct !== "" && pct !== "0%" && pct !== "100%" && window.getComputedStyle(dlBtn).display === 'none') {
      overlay.style.display = 'flex';
      document.getElementById('ovBar').style.width = pct;
      document.getElementById('ovPercent').innerText = realStatus.innerText;
      document.getElementById('ovEta').innerText = realEta.innerText;
    }

    // Якщо з'явилася кнопка "Скачать" - значить все готово
    if (window.getComputedStyle(dlBtn).display === 'block') {
      overlay.style.display = 'none';
      cardEditor.classList.add('hidden');
      cardResult.classList.remove('hidden');
    }
  });

  observer.observe(realBar, { attributes: true });
  observer.observe(dlBtn, { attributes: true });

  // 3. Таби (візуальне перемикання)
  const tAuto = document.getElementById('tabAuto');
  const tManual = document.getElementById('tabManual');
  tAuto.onclick = () => {
    tAuto.style.background = 'var(--primary)'; tAuto.style.color = 'white';
    tManual.style.background = 'none'; tManual.style.color = '#333';
  };
  tManual.onclick = () => {
    tManual.style.background = 'var(--primary)'; tManual.style.color = 'white';
    tAuto.style.background = 'none'; tAuto.style.color = '#333';
  };
</script>

</body>
</html>
