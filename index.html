<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pause Remover Pro</title>
  <style>
    body { margin: 0; font-family: -apple-system, Segoe UI, Roboto, sans-serif; background: #f5f9ff; display: flex; justify-content: center; }
    .app { width: 100%; max-width: 600px; padding: 20px; }
    .card { background: white; border-radius: 16px; padding: 16px; margin-bottom: 16px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
    h2 { text-align: center; margin-bottom: 20px; color: #2b6cff; }
    input[type="file"] { display: block; width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
    label { font-size: 14px; margin-top: 10px; display: block; font-weight: 600; }
    .slider-value { font-size: 13px; color: #555; margin-top: 4px; }
    input[type="range"] { width: 100%; cursor: pointer; }
    button { width: 100%; padding: 14px; border: none; border-radius: 12px; background: #2b6cff; color: white; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.2s; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    button:hover:not(:disabled) { background: #1f54cc; }
    #progress { text-align: center; font-size: 14px; margin-top: 10px; min-height: 1.2em; color: #444; }
    #waveform { width: 100%; height: 120px; display: block; border-radius: 10px; background: #fafafa; border: 1px solid #eee; }
    video { width: 100%; border-radius: 12px; margin-top: 10px; background: #000; }
    #downloadBtn { display: none; margin-top: 10px; text-align: center; padding: 12px; background: #00b894; color: white; text-decoration: none; border-radius: 12px; font-weight: bold; }
  </style>
</head>
<body>

<div class="app">
  <h2>Remove pauses</h2>

  <div class="card">
    <input type="file" id="fileInput" accept="video/*">
  </div>

  <div class="card">
    <label>Минимальная тишина (сек)</label>
    <input type="range" id="duration" min="0.1" max="2" step="0.05" value="0.5">
    <div class="slider-value" id="durationVal">0.5 сек</div>

    <label>Чувствительность (dB)</label>
    <input type="range" id="threshold" min="-60" max="-10" step="1" value="-35">
    <div class="slider-value" id="thresholdVal">-35 dB</div>

    <button id="processBtn">Обработать видео</button>
    <div id="progress">Выберите файл для начала</div>
  </div>

  <div class="card">
    <canvas id="waveform"></canvas>
  </div>

  <div class="card">
    <video id="preview" controls></video>
    <a id="downloadBtn" download="cleaned_video.mp4">Скачать результат</a>
  </div>
</div>

<script src="./ffmpeg/ffmpeg.min.js"></script>
<script src="script.js"></script>
<script>
  // Простая связка UI для мгновенного отклика
  const dInput = document.getElementById("duration");
  const tInput = document.getElementById("threshold");
  dInput.addEventListener("input", () => document.getElementById("durationVal").innerText = dInput.value + " сек");
  tInput.addEventListener("input", () => document.getElementById("thresholdVal").innerText = tInput.value + " dB");
</script>
</body>
</html>
