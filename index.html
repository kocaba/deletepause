<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pause Remover Pro - WebProgger</title>
    <style>
        :root { --p-clr: #2b6cff; --s-clr: #00b894; --b-clr: #050505; --err-clr: rgba(255, 50, 50, 0.5); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            background: var(--b-clr); color: #fff; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            padding-top: 100px; overflow-x: hidden;
        }
        .bg_anim { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: #000; }
        .blob { position: absolute; width: 500px; height: 500px; background: radial-gradient(circle, rgba(43,108,255,0.4) 0%, rgba(0,0,0,0) 70%); border-radius: 50%; filter: blur(60px); animation: move 8s infinite alternate; }
        @keyframes move { 0% { transform: translate(-20%, -20%); } 100% { transform: translate(40%, 30%); } }

        header div.f_head { padding-top: 10px; width: 100%; min-height: 70px; position: fixed; top: 0; left: 0; z-index: 999; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-bottom: 1px solid #ddd; }
        .main_app_v3 { width: 100%; max-width: 600px; padding: 0 15px; z-index: 10; }
        .card_main { background: #fff; border-radius: 24px; padding: 25px; margin-bottom: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); color: #333; }
        h2 { text-align: center; margin-top: 0; color: var(--p-clr); }
        
        .f_inp_88 { width: 100%; padding: 40px 20px; border: 3px dashed #e0e0e0; border-radius: 16px; cursor: pointer; text-align: center; color: #888; }
        
        #ov_scr_55 { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; flex-direction: column; justify-content: center; align-items: center; color: white; }
        .p_bar_bg { width: 80%; height: 10px; background: #222; border-radius: 5px; margin: 20px 0; }
        #p_bar_fill { width: 0%; height: 100%; background: var(--p-clr); transition: 0.2s; }
        
        .tabs_row { display: flex; background: #f0f0f0; border-radius: 12px; padding: 5px; margin-bottom: 20px; }
        .tab_btn { flex: 1; text-align: center; padding: 12px; cursor: pointer; border-radius: 10px; font-weight: bold; color: #666; }
        .active_t { background: var(--p-clr); color: white; }
        
        #wv_cvs_11 { width: 100%; height: 150px; background: #f9f9f9; border-radius: 12px; border: 1px solid #ddd; margin: 15px 0; }
        .btn_prim { width: 100%; padding: 18px; border: none; border-radius: 16px; background: var(--p-clr); color: white; font-size: 17px; font-weight: bold; cursor: pointer; }
        .hidden_node { display: none !important; }
        label { font-weight: bold; font-size: 14px; display: block; margin-top: 10px; }
        input[type=range] { width: 100%; margin: 10px 0; }
    </style>
</head>
<body>

<div id="ov_scr_55">
    <h2 style="color:white" id="ov_title">Обробка...</h2>
    <div id="ov_pct" style="font-size: 50px; font-weight: 900; color: var(--p-clr);">0%</div>
    <div class="p_bar_bg"><div id="p_bar_fill"></div></div>
    <div id="ov_eta">Зачекайте, будь ласка</div>
</div>

<div class="main_app_v3">
    <div id="step_file">
        <div class="card_main">
            <h2>Pause Remover Pro</h2>
            <div class="f_inp_88" onclick="document.getElementById('real_f').click()">
                <div style="font-size:40px;">📁</div>
                Завантажити відео
                <input type="file" id="real_f" accept="video/*" style="display:none">
            </div>
        </div>
    </div>

    <div class="card_main hidden_node" id="step_editor">
        <div class="tabs_row">
            <div id="t_auto" class="tab_btn active_t">Авто</div>
            <div id="t_manual" class="tab_btn">Ручна настройка</div>
        </div>

        <div id="m_cntrls" class="hidden_node">
            <label>Мінімальна пауза: <span id="txt_dur">0.5</span> сек</label>
            <input type="range" id="val_dur" min="0.1" max="2.0" step="0.05" value="0.5">
            
            <label>Поріг шуму: <span id="txt_db">-35</span> dB</label>
            <input type="range" id="val_db" min="-60" max="-10" step="1" value="-35">
        </div>
        
        <div id="a_info" style="font-size: 13px; color: #666; margin-bottom:10px;">✨ Параметри підібрано автоматично</div>
        
        <canvas id="wv_cvs_11"></canvas>
        <button id="go_proc" class="btn_prim">Вирізати паузи</button>
    </div>

    <div class="card_main hidden_node" id="step_result">
        <video id="vid_pre_77" controls style="width:100%; border-radius:12px;"></video>
        <a id="dl_btn_99" download="result.mp4" class="btn_prim" style="display:block; text-decoration:none; text-align:center; background:var(--s-clr); margin: 15px 0;">Скачати відео</a>
        <button class="btn_prim" style="background:#666;" onclick="location.reload()">Інше відео</button>
    </div>
</div>

<script src="./ffmpeg/ffmpeg.min.js"></script>
<script src="script.js"></script>
</body>
</html>
