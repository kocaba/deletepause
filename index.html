<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pause Remover Pro</title>
  <style>
    :root { --primary: #2b6cff; --success: #00b894; --bg: #f5f9ff; }
    body { margin: 0; font-family: -apple-system, sans-serif; background: var(--bg); display: flex; justify-content: center; color: #333; }
    .app { width: 100%; max-width: 600px; padding: 20px; }
    .card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    h2 { text-align: center; margin-top: 0; color: var(--primary); }
    input[type="file"] { width: 100%; padding: 10px; border: 1px dashed #ccc; border-radius: 10px; cursor: pointer; box-sizing: border-box; }
    label { font-size: 14px; margin-top: 15px; display: block; font-weight: bold; }
    .slider-info { display: flex; justify-content: space-between; font-size: 13px; color: #666; margin-top: 4px; }
    input[type="range"] { width: 100%; margin-top: 8px; cursor: pointer; }
    
    .progress-container { margin: 20px 0; display: none; }
    .progress-bg { width: 100%; background: #eee; height: 12px; border-radius: 6px; overflow: hidden; position: relative; }
    #progressBar { width: 0%; height: 100%; background: var(--primary); transition: width 0.3s linear; }
    #statusText { text-align: center; font-weight: bold; margin-bottom: 5px; font-size: 15px; }
    #etaText { text-align: center; font-size: 12px; color: #888; margin-top: 5px; }

    button { width: 100%; padding: 15px; border: none; border-radius: 12px; background: var(--primary); color: white; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    
    #waveform { width: 100%; height: 120px; background: #fafafa; border-radius: 10px; border: 1px solid #eee; display: block; }
    video { width: 100%; border-radius: 12px; margin-top: 10px; background: #000; }
    #downloadBtn { display: none; margin-top: 12px; text-align: center; padding: 15px; background: var(--success); color: white; text-decoration: none; border-radius: 12px; font-weight: bold; }
  </style>
</head>
<body>

<div class="app">
  <div class="card">
    <h2>Remove Pauses</h2>
    <input type="file" id="fileInput" accept="video/*">
  </div>

  <div class="card">
    <div style="display: flex; background: #eee; border-radius: 10px; padding: 4px; margin-bottom: 15px;">
      <div id="tabAuto" style="flex: 1; text-align: center; padding: 8px; cursor: pointer; border-radius: 8px; background: var(--primary); color: white; font-weight: bold;">Авто</div>
      <div id="tabManual" style="flex: 1; text-align: center; padding: 8px; cursor: pointer; border-radius: 8px;">Вручную</div>
    </div>

    <div id="manualControls" style="display: none;">
      <label>Минимальная тишина</label>
      <input type="range" id="duration" min="0.1" max="2.0" step="0.05" value="0.5">
      <div class="slider-info"><span>Короткие паузы</span><span id="durationVal">0.5 сек</span></div>

      <label>Чувствительность (dB)</label>
      <input type="range" id="threshold" min="-60" max="-10" step="1" value="-35">
      <div class="slider-info"><span>Тише</span><span id="thresholdVal">-35 dB</span></div>
    </div>

    <div id="autoInfo" style="padding: 10px; font-size: 14px; background: #f0f7ff; border-radius: 10px; border: 1px solid #d0e0ff; margin-bottom: 10px;">
      ✨ Режим «Авто» подберет настройки под ваш звук.
    </div>

    <div class="progress-container" id="progCont">
      <div id="statusText">Ожидание...</div>
      <div class="progress-bg"><div id="progressBar"></div></div>
      <div id="etaText">Осталось: -- сек</div>
    </div>

    <button id="processBtn">Запустить обработку</button>
  </div>

  <div class="card">
    <canvas id="waveform"></canvas>
  </div>

  <div class="card">
    <video id="preview" controls></video>
    <a id="downloadBtn" download="no_pauses.mp4">Скачать готовое видео</a>
  </div>
</div>

<script src="./ffmpeg/ffmpeg.min.js"></script>
<script>
const { createFFmpeg, fetchFile } = FFmpeg;
const ffmpeg = createFFmpeg({ 
    log: true, // Включено для отладки прогресса
    corePath: './ffmpeg/ffmpeg-core.js' 
});

let audioBufferData = null;
let cachedRMS = [];
let audioDuration = 0;
let sampleRate = 44100;
let isLoaded = false;
let currentMode = 'auto';

const ui = {
    duration: document.getElementById("duration"),
    threshold: document.getElementById("threshold"),
    durationVal: document.getElementById("durationVal"),
    thresholdVal: document.getElementById("thresholdVal"),
    processBtn: document.getElementById("processBtn"),
    progCont: document.getElementById("progCont"),
    progressBar: document.getElementById("progressBar"),
    statusText: document.getElementById("statusText"),
    etaText: document.getElementById("etaText"),
    downloadBtn: document.getElementById("downloadBtn"),
    preview: document.getElementById("preview"),
    autoInfo: document.getElementById("autoInfo"),
    manualControls: document.getElementById("manualControls"),
    tabAuto: document.getElementById("tabAuto"),
    tabManual: document.getElementById("tabManual")
};

const WINDOW_SIZE = 1024;

function switchTab(mode) {
    currentMode = mode;
    ui.tabAuto.style.background = mode === 'auto' ? '#2b6cff' : 'none';
    ui.tabAuto.style.color = mode === 'auto' ? 'white' : '#333';
    ui.tabManual.style.background = mode === 'manual' ? '#2b6cff' : 'none';
    ui.tabManual.style.color = mode === 'manual' ? 'white' : '#333';
    ui.manualControls.style.display = mode === 'manual' ? 'block' : 'none';
    ui.autoInfo.style.display = mode === 'auto' ? 'block' : 'none';
    if (audioBufferData) drawWaveform();
}

ui.tabAuto.onclick = () => switchTab('auto');
ui.tabManual.onclick = () => switchTab('manual');

function precalculateRMS() {
    cachedRMS = [];
    for (let i = 0; i < audioBufferData.length; i += WINDOW_SIZE) {
        let sum = 0;
        for (let j = 0; j < WINDOW_SIZE; j++) {
            const s = audioBufferData[i + j] || 0;
            sum += s * s;
        }
        cachedRMS.push(Math.sqrt(sum / WINDOW_SIZE));
    }
}

function getAutoParams() {
    if (!cachedRMS.length) return { db: -35, dur: 0.5 };
    const sorted = [...cachedRMS].sort((a, b) => a - b);
    const noiseLevel = sorted[Math.floor(sorted.length * 0.1)] || 0.001;
    let autoDb = Math.round(20 * Math.log10(noiseLevel + 1e-6) + 8);
    if (autoDb < -50) autoDb = -45;
    if (autoDb > -25) autoDb = -30;
    let autoDur = audioDuration > 60 ? 0.6 : 0.45;
    return { db: autoDb, dur: autoDur };
}

function detectSilenceFast(db, minDur) {
    const limit = Math.pow(10, db / 20);
    const silences = [];
    let start = null;
    const secPerBlock = WINDOW_SIZE / sampleRate;
    for (let i = 0; i < cachedRMS.length; i++) {
        const time = i * secPerBlock;
        if (cachedRMS[i] < limit) {
            if (start === null) start = time;
        } else if (start !== null) {
            if (time - start >= minDur) silences.push({ start, end: time });
            start = null;
        }
    }
    return silences;
}

function drawWaveform() {
    if (!audioBufferData) return;
    
    const canvas = document.getElementById("waveform");
    const ctx = canvas.getContext("2d");
    
    // Важно: принудительно обновляем ширину
    canvas.width = canvas.clientWidth;
    canvas.height = canvas.clientHeight;
    
    const w = canvas.width;
    const h = canvas.height;

    ctx.clearRect(0, 0, w, h);
    const step = Math.ceil(audioBufferData.length / w);
    ctx.fillStyle = "#2b6cff";
    
    for (let i = 0; i < w; i++) {
        let min = 1, max = -1;
        for (let j = 0; j < step; j++) {
            const val = audioBufferData[(i * step) + j] || 0;
            if (val < min) min = val;
            if (val > max) max = val;
        }
        ctx.fillRect(i, (1 + min) * (h/2), 1, Math.max(1, (max - min) * (h/2)));
    }

    let db, dur;
    if (currentMode === 'auto') {
        const auto = getAutoParams();
        db = auto.db; dur = auto.dur;
        ui.autoInfo.innerText = `✨ Авто: Порог ${db}dB, Мин. тишина ${dur}сек`;
    } else {
        db = parseFloat(ui.threshold.value);
        dur = parseFloat(ui.duration.value);
    }

    const silences = detectSilenceFast(db, dur);
    ctx.fillStyle = "rgba(255, 50, 50, 0.4)";
    silences.forEach(s => {
        const x1 = (s.start / audioDuration) * w;
        const x2 = (s.end / audioDuration) * w;
        ctx.fillRect(x1, 0, x2 - x1, h);
    });
}

document.getElementById("fileInput").onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    ui.statusText.innerText = "Декодирование аудио...";
    ui.progCont.style.display = "block";
    
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const arrayBuffer = await file.arrayBuffer();
    const decoded = await audioCtx.decodeAudioData(arrayBuffer);

    audioBufferData = decoded.getChannelData(0);
    audioDuration = decoded.duration;
    sampleRate = decoded.sampleRate;

    precalculateRMS();
    
    // Задержка чтобы браузер успел отрисовать контейнер
    setTimeout(() => {
        drawWaveform();
        ui.statusText.innerText = "Готово к обработке";
    }, 100);
    
    ui.preview.src = URL.createObjectURL(file);
};

ui.duration.oninput = () => { ui.durationVal.innerText = ui.duration.value + " сек"; drawWaveform(); };
ui.threshold.oninput = () => { ui.thresholdVal.innerText = ui.threshold.value + " dB"; drawWaveform(); };

let totalOutDur = 0;
let startTime = 0;

ffmpeg.setLogger(({ message }) => {
    // Улучшенный регулярный запрос для времени ffmpeg
    const match = message.match(/time=(\d{2}):(\d{2}):(\d{2}\.\d{2})/);
    if (match && totalOutDur > 0) {
        const time = parseInt(match[1])*3600 + parseInt(match[2])*60 + parseFloat(match[3]);
        const percent = Math.min(99.9, (time / totalOutDur) * 100);
        
        ui.progressBar.style.width = percent + "%";
        ui.statusText.innerText = `Обработка: ${percent.toFixed(1)}%`;

        const elapsed = (Date.now() - startTime) / 1000;
        if (time > 0.1) {
            const eta = Math.round((totalOutDur - time) / (time / elapsed));
            if (eta >= 0) ui.etaText.innerText = `Осталось примерно: ${eta} сек.`;
        }
    }
});

ui.processBtn.onclick = async () => {
    const file = document.getElementById("fileInput").files[0];
    if (!file || !audioBufferData) return alert("Файл не выбран");

    ui.processBtn.disabled = true;
    ui.downloadBtn.style.display = "none";
    ui.progCont.style.display = "block";
    ui.progressBar.style.width = "0%";
    
    if (!isLoaded) {
        ui.statusText.innerText = "Загрузка FFmpeg...";
        await ffmpeg.load();
        isLoaded = true;
    }

    let db, dur;
    if (currentMode === 'auto') {
        const auto = getAutoParams();
        db = auto.db; dur = auto.dur;
    } else {
        db = parseFloat(ui.threshold.value);
        dur = parseFloat(ui.duration.value);
    }

    const silences = detectSilenceFast(db, dur);
    const segments = [];
    let prev = 0;
    const PAD = 0.1;
    silences.forEach(s => {
        if (s.start > prev) segments.push({ start: Math.max(0, prev - (prev===0?0:PAD)), end: s.start + PAD });
        prev = s.end;
    });
    if (prev < audioDuration) segments.push({ start: Math.max(0, prev - PAD), end: audioDuration });

    totalOutDur = segments.reduce((acc, s) => acc + (s.end - s.start), 0);
    
    ui.statusText.innerText = "Подготовка видео...";
    ffmpeg.FS("writeFile", "in.mp4", await fetchFile(file));

    let filter = "";
    let concat = "";
    segments.forEach((s, i) => {
        filter += `[0:v]trim=start=${s.start.toFixed(3)}:end=${s.end.toFixed(3)},setpts=PTS-STARTPTS[v${i}];`;
        filter += `[0:a]atrim=start=${s.start.toFixed(3)}:end=${s.end.toFixed(3)},asetpts=PTS-STARTPTS[a${i}];`;
        concat += `[v${i}][a${i}]`;
    });
    filter += `${concat}concat=n=${segments.length}:v=1:a=1[ov][oa]`;

    ui.statusText.innerText = "Запуск рендеринга...";
    startTime = Date.now(); // Фиксируем время начала

    await ffmpeg.run(
        "-i", "in.mp4",
        "-filter_complex", filter,
        "-map", "[ov]", "-map", "[oa]", 
        "-c:v", "libx264", 
        "-preset", "ultrafast", 
        "-crf", "28", 
        "-c:a", "aac", 
        "out.mp4"
    );

    const data = ffmpeg.FS("readFile", "out.mp4");
    const url = URL.createObjectURL(new Blob([data.buffer], { type: "video/mp4" }));
    
    ui.progressBar.style.width = "100%";
    ui.preview.src = url;
    ui.downloadBtn.href = url;
    ui.downloadBtn.style.display = "block";
    ui.statusText.innerText = "Готово!";
    ui.etaText.innerText = "Обработка завершена";
    ui.processBtn.disabled = false;
};
</script>
</body>
</html>
