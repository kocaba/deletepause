<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pause Remover Pro - WebProgger</title>
    <style>
        :root { --p-clr: #2b6cff; --s-clr: #00b894; --b-clr: #050505; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            background: var(--b-clr); color: #fff; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            padding-top: 100px; overflow-x: hidden;
        }

        /* АНІМАЦІЯ ФОНУ */
        .bg_anim { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: #000; }
        .blob {
            position: absolute; width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(43,108,255,0.2) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%; filter: blur(60px); animation: move 10s infinite alternate ease-in-out;
        }
        @keyframes move { 0% { transform: translate(-10%, -10%); } 100% { transform: translate(30%, 20%); } }

        /* ХЕДЕР */
        header .f_head {
            width: 100%; height: 70px; position: fixed; top: 0; left: 0; z-index: 100;
            background: rgba(255,255,255,0.95); backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: center; border-bottom: 1px solid #ddd;
        }
        .logo_txt { color: #000; font-weight: bold; font-size: 20px; text-decoration: none; }
        .logo_txt span { color: darkblue; }

        .main_app_v3 { width: 100%; max-width: 500px; padding: 0 15px; z-index: 10; }
        
        .card_main { 
            background: #fff; border-radius: 24px; padding: 25px; 
            margin-bottom: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); color: #333;
        }
        h2 { text-align: center; margin-top: 0; color: var(--p-clr); font-size: 22px; }
        
        .f_inp_88 { 
            width: 100%; padding: 40px 10px; border: 2px dashed #ccc; border-radius: 16px; 
            background: #f9f9f9; text-align: center; cursor: pointer; color: #777; font-weight: 600;
        }

        /* PROGRESS OVERLAY */
        #ov_scr_55 {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 9999; flex-direction: column;
            justify-content: center; align-items: center; color: white;
        }
        .p_bar_bg { width: 80%; height: 8px; background: #333; border-radius: 4px; margin: 20px 0; overflow: hidden; }
        #p_bar_fill { width: 0%; height: 100%; background: var(--p-clr); transition: width 0.3s; }
        
        /* CONTROLS */
        .tabs_row { display: flex; background: #eee; border-radius: 12px; padding: 4px; margin-bottom: 15px; }
        .tab_btn { flex: 1; text-align: center; padding: 10px; cursor: pointer; border-radius: 10px; font-size: 14px; font-weight: bold; color: #666; }
        .active_t { background: var(--p-clr); color: white; }
        
        .btn_prim { 
            width: 100%; padding: 16px; border: none; border-radius: 14px; 
            background: var(--p-clr); color: white; font-size: 16px; font-weight: bold; cursor: pointer;
        }
        
        #wv_cvs_11 { width: 100%; height: 100px; background: #fafafa; border-radius: 10px; border: 1px solid #eee; margin: 10px 0; }
        .info_box { font-size: 13px; color: #666; background: #f0f7ff; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
        input[type=range] { width: 100%; margin: 10px 0; }
        .hidden_node { display: none !important; }
        video { width: 100%; border-radius: 12px; }
    </style>
</head>
<body>

<div class="bg_anim"><div class="blob"></div></div>

<header>
    <div class="f_head">
        <a href="#" class="logo_txt">Web<span>Progger</span></a>
    </div>
</header>

<div id="ov_scr_55">
    <div id="ov_pct" style="font-size: 48px; font-weight: 900; color: var(--p-clr);">0%</div>
    <div id="ov_title">Обробка відео...</div>
    <div class="p_bar_bg"><div id="p_bar_fill"></div></div>
    <div style="font-size:12px; opacity:0.5">Не згортайте браузер</div>
</div>

<div class="main_app_v3">
    <div id="step_file" class="card_main">
        <h2>Pause Remover Pro</h2>
        <div class="f_inp_88" onclick="document.getElementById('real_f').click()">
            <div style="font-size:30px;">🎬</div>
            Оберіть відео для обробки
            <input type="file" id="real_f" accept="video/*" style="display:none">
        </div>
        <p style="font-size: 12px; color: #999; text-align: center; margin-top: 15px;">
            Всі обчислення проходять прямо на вашому телефоні.
        </p>
    </div>

    <div id="step_editor" class="card_main hidden_node">
        <div class="tabs_row">
            <div id="t_auto" class="tab_btn active_t">Авто</div>
            <div id="t_manual" class="tab_btn">Ручне</div>
        </div>

        <div id="m_cntrls" class="hidden_node">
            <label style="font-size:12px; font-weight:bold;">Довжина пауз (сек)</label>
            <input type="range" id="val_dur" min="0.1" max="1.5" step="0.05" value="0.4">
            <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:10px;">
                <span>Більше склейок</span><span id="txt_dur">0.4 сек</span>
            </div>

            <label style="font-size:12px; font-weight:bold;">Поріг шуму (dB)</label>
            <input type="range" id="val_db" min="-50" max="-20" step="1" value="-35">
            <div style="display:flex;justify-content:space-between;font-size:11px;">
                <span>Тихіше</span><span id="txt_db">-35 dB</span>
            </div>
        </div>

        <div id="a_info" class="info_box">✨ Штучний інтелект підібрав оптимальні параметри для вашого відео.</div>
        
        <canvas id="wv_cvs_11"></canvas>
        <button id="go_proc" class="btn_prim">Вирізати всі паузи</button>
    </div>

    <div id="step_result" class="card_main hidden_node">
        <h2>Готово!</h2>
        <video id="vid_pre_77" controls></video>
        <a id="dl_btn_99" download="result.mp4" class="btn_prim" style="display:block; text-decoration:none; background:var(--s-clr); text-align:center; margin: 15px 0;">Завантажити у галерею</a>
        <button class="btn_prim" style="background:#eee; color:#333;" onclick="location.reload()">Обробити ще одне</button>
    </div>
</div>

<script src="./ffmpeg/ffmpeg.min.js"></script>
<script src="script.js"></script>
</body>
</html>
