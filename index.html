<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pause Remover Pro</title>
  <style>
    :root { --primary: #2b6cff; --success: #00b894; --bg: #000; }
    
    * { box-sizing: border-box; } /* ГАРАНТІЯ того, що рамки не вилізуть */

    body { 
      margin: 0; font-family: -apple-system, sans-serif; background: var(--bg); 
      display: flex; justify-content: center; color: #333; min-height: 100vh;
      position: relative;
    }

    /* Анімований фон */
    .bg-circle {
      position: fixed; width: 600px; height: 600px;
      background: radial-gradient(circle, #1e3a8a 0%, rgba(0,0,0,0) 70%);
      border-radius: 50%; filter: blur(80px); z-index: -1;
      top: 10%; left: -10%;
    }

    .app { width: 100%; max-width: 600px; padding: 20px; z-index: 1; }
    
    .card { 
      background: rgba(255, 255, 255, 0.98); border-radius: 16px; padding: 20px; 
      margin-bottom: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
    }

    h2 { text-align: center; margin-top: 0; color: var(--primary); }
    
    /* Поле вибору файлу - ТЕПЕР НЕ ВИЛАЗИТЬ */
    input[type="file"] { 
      width: 100%; padding: 12px; border: 2px dashed #ccc; border-radius: 10px; 
      cursor: pointer; background: #fff;
    }

    label { font-size: 14px; margin-top: 15px; display: block; font-weight: bold; }
    .slider-info { display: flex; justify-content: space-between; font-size: 13px; color: #666; margin-top: 4px; }
    input[type="range"] { width: 100%; margin-top: 8px; cursor: pointer; }

    /* Динамічний оверлей: стає на весь екран, коли скрипт вмикає прогрес */
    .progress-container[style*="display: block"] {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.95); z-index: 9999; display: flex !important;
      flex-direction: column; justify-content: center; align-items: center; padding: 20px;
    }
    
    .progress-container[style*="display: block"] #statusText { color: white; font-size: 40px; margin-bottom: 20px; }
    .progress-container[style*="display: block"] .progress-bg { width: 80%; max-width: 400px; height: 12px; background: #333; }
    .progress-container[style*="display: block"] #etaText { color: #aaa; margin-top: 15px; }

    .progress-bg { width: 100%; background: #eee; height: 10px; border-radius: 6px; overflow: hidden; }
    #progressBar { width: 0%; height: 100%; background: var(--primary); transition: width 0.3s ease; }
    #statusText { text-align: center; font-weight: bold; margin-bottom: 5px; }

    button { width: 100%; padding: 15px; border: none; border-radius: 12px; background: var(--primary); color: white; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    button:disabled { background: #ccc; }
    
    #waveform { width: 100%; height: 120px; background: #fafafa; border-radius: 10px; border: 1px solid #eee; display: block; }
    
    /* Відео 40% */
    .video-wrap { display: flex; justify-content: center; width: 100%; }
    video { width: 40% !important; border-radius: 12px; margin-top: 10px; background: #000; }
    
    #downloadBtn { display: none; margin-top: 12px; text-align: center; padding: 15px; background: var(--success); color: white; text-decoration: none; border-radius: 12px; font-weight: bold; }
  </style>
</head>
<body>

<div class="bg-circle"></div>

<div class="app">
  <div class="card">
    <h2>Remove Pauses</h2>
    <input type="file" id="fileInput" accept="video/*">
  </div>

  <div class="card">
    <div style="display: flex; background: #eee; border-radius: 10px; padding: 4px; margin-bottom: 15px;">
      <div id="tabAuto" style="flex: 1; text-align: center; padding: 8px; cursor: pointer; border-radius: 8px; background: var(--primary); color: white; font-weight: bold;">Авто</div>
      <div id="tabManual" style="flex: 1; text-align: center; padding: 8px; cursor: pointer; border-radius: 8px;">Вручную</div>
    </div>

    <div id="manualControls" style="display: none;">
      <label>Минимальная тишина</label>
      <input type="range" id="duration" min="0.1" max="2.0" step="0.05" value="0.5">
      <div class="slider-info"><span>Короткие паузы</span><span id="durationVal">0.5 сек</span></div>

      <label>Чувствительность (dB)</label>
      <input type="range" id="threshold" min="-60" max="-10" step="1" value="-35">
      <div class="slider-info"><span>Тише</span><span id="thresholdVal">-35 dB</span></div>
    </div>

    <div id="autoInfo" style="padding: 10px; font-size: 14px; background: #f0f7ff; border-radius: 10px; border: 1px solid #d0e0ff; margin-bottom: 10px;">
      ✨ Режим «Авто» подберет настройки под ваш звук.
    </div>

    <div class="progress-container" id="progCont">
      <div id="statusText">Ожидание...</div>
      <div class="progress-bg"><div id="progressBar"></div></div>
      <div id="etaText">Осталось: -- сек</div>
    </div>

    <button id="processBtn">Запустить обработку</button>
  </div>

  <div class="card">
    <canvas id="waveform"></canvas>
  </div>

  <div class="card">
    <div class="video-wrap">
      <video id="preview" controls></video>
    </div>
    <a id="downloadBtn" download="no_pauses.mp4">Скачать готовое видео</a>
    <button style="background:#666; margin-top:10px;" onclick="location.reload()">Новое видео</button>
  </div>
</div>

<script src="./ffmpeg/ffmpeg.min.js"></script>
<script src="script.js"></script>

<script>
  // Тільки логіка підсвічування кнопок табів, щоб не заважати script.js
  const tAuto = document.getElementById('tabAuto');
  const tManual = document.getElementById('tabManual');

  tAuto.onclick = () => {
    tAuto.style.background = 'var(--primary)'; tAuto.style.color = 'white';
    tManual.style.background = 'none'; tManual.style.color = '#333';
    // Решта логіки (показ/приховання) вже є у твоєму script.js
  };

  tManual.onclick = () => {
    tManual.style.background = 'var(--primary)'; tManual.style.color = 'white';
    tAuto.style.background = 'none'; tAuto.style.color = '#333';
  };
</script>

</body>
</html>
