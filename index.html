<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Remove Pauses</title>

<style>
:root {
  --primary: #4f7cff;
  --accent: #00c9a7;
  --bg: #0b0f1a;
  --card: rgba(255,255,255,0.05);
  --border: rgba(255,255,255,0.08);
}

/* BACKGROUND */
body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  background: var(--bg);
  color: #fff;
  overflow-x: hidden;
}

body::before {
  content: "";
  position: fixed;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, #4f7cff55, transparent 70%);
  filter: blur(120px);
  animation: moveBg 12s infinite alternate ease-in-out;
  z-index: -1;
}

@keyframes moveBg {
  from { transform: translate(-20%, -10%); }
  to { transform: translate(60%, 40%); }
}

/* LAYOUT */
.app {
  max-width: 700px;
  margin: auto;
  padding: 20px;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 25px;
}

.logo {
  font-weight: bold;
  font-size: 20px;
  color: var(--primary);
}

.description {
  text-align: center;
  margin-bottom: 20px;
  color: #aaa;
}

/* CARD */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  backdrop-filter: blur(12px);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 15px;
}

/* INPUT */
input[type="file"] {
  width: 100%;
  padding: 15px;
  border: 1px dashed #444;
  border-radius: 12px;
  background: transparent;
  color: #aaa;
}

/* TABS */
.tabs {
  display: flex;
  background: #111;
  border-radius: 10px;
  padding: 4px;
  margin-bottom: 15px;
}

.tab {
  flex: 1;
  text-align: center;
  padding: 10px;
  cursor: pointer;
  border-radius: 8px;
}

.active {
  background: var(--primary);
}

/* SLIDERS */
label {
  margin-top: 12px;
  display: block;
}

input[type="range"] {
  width: 100%;
}

.slider-info {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: #888;
}

/* BUTTON */
button {
  width: 100%;
  padding: 15px;
  border: none;
  border-radius: 12px;
  background: var(--primary);
  color: white;
  font-weight: bold;
  cursor: pointer;
}

/* VIDEO */
video {
  width: 100%;
  border-radius: 12px;
  background: #000;
}

/* DOWNLOAD */
#downloadBtn {
  display: none;
  margin-top: 10px;
  padding: 14px;
  background: var(--accent);
  text-align: center;
  border-radius: 12px;
  text-decoration: none;
  color: white;
}

/* PROGRESS OVERLAY */
#overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  z-index: 999;
}

.loader {
  width: 60px;
  height: 60px;
  border: 4px solid #333;
  border-top: 4px solid var(--primary);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin-bottom: 20px;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.progress-container {
  width: 80%;
  max-width: 400px;
}

.progress-bg {
  width: 100%;
  background: #222;
  height: 10px;
  border-radius: 6px;
}

#progressBar {
  height: 100%;
  width: 0%;
  background: var(--primary);
}

/* FOOTER */
footer {
  margin-top: 30px;
  text-align: center;
  color: #555;
  font-size: 13px;
}

footer a {
  color: #555;
  margin: 0 10px;
  text-decoration: none;
}
</style>
</head>

<body>

<div id="overlay">
  <div class="loader"></div>

  <div class="progress-container" id="progCont">
    <div id="statusText">Обработка...</div>
    <div class="progress-bg"><div id="progressBar"></div></div>
    <div id="etaText">Осталось: -- сек</div>
  </div>
</div>

<div class="app">

<header>
  <div class="logo">Remove pauses</div>
</header>

<div class="description">
  Автоматически удаляет паузы из видео и ускоряет монтаж
</div>

<div class="card">
  <input type="file" id="fileInput" accept="video/*">
</div>

<div class="card">

  <div class="tabs">
    <div id="tabAuto" class="tab active">Авто</div>
    <div id="tabManual" class="tab">Ручной режим</div>
  </div>

  <div id="manualControls" style="display:none;">
    <label>Минимальная тишина</label>
    <input type="range" id="duration" min="0.1" max="2.0" step="0.05" value="0.5">
    <div class="slider-info"><span></span><span id="durationVal">0.5</span></div>

    <label>Чувствительность</label>
    <input type="range" id="threshold" min="-60" max="-10" step="1" value="-35">
    <div class="slider-info"><span></span><span id="thresholdVal">-35</span></div>
  </div>

  <div id="autoInfo">
    Режим авто сам подбирает настройки
  </div>

  <button id="processBtn">Обработать видео</button>
</div>

<div class="card">
  <canvas id="waveform"></canvas>
</div>

<div class="card">
  <video id="preview" controls></video>

  <a id="downloadBtn" download="no_pauses.mp4">Скачать</a>

  <button onclick="location.reload()">Новое видео</button>
</div>

<footer>
  <a href="#">Privacy</a>
  <a href="#">Terms</a>
  <a href="#">Contacts</a>
</footer>

</div>

<script src="./ffmpeg/ffmpeg.min.js"></script>
<script src="script.js"></script>

<script>
/* UI only - не ломает логику */
const overlay = document.getElementById("overlay");
const processBtn = document.getElementById("processBtn");

processBtn.addEventListener("click", () => {
  overlay.style.display = "flex";
});

/* вкладки */
const tabAuto = document.getElementById("tabAuto");
const tabManual = document.getElementById("tabManual");
const manualControls = document.getElementById("manualControls");
const autoInfo = document.getElementById("autoInfo");

tabAuto.onclick = () => {
  tabAuto.classList.add("active");
  tabManual.classList.remove("active");
  manualControls.style.display = "none";
  autoInfo.style.display = "block";
};

tabManual.onclick = () => {
  tabManual.classList.add("active");
  tabAuto.classList.remove("active");
  manualControls.style.display = "block";
  autoInfo.style.display = "none";
};
</script>

</body>
</html>
