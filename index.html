<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pause Remover Pro — Розумний монтаж</title>
  <style>
    :root {
      --primary: #2b6cff;
      --accent: #00d2ff;
      --success: #00b894;
      --glass: rgba(255, 255, 255, 0.95);
      --text-main: #1a202c;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: linear-gradient(-45deg, #020617, #0f172a, #1e3a8a, #2563eb);
      background-size: 400% 400%;
      animation: gradientBG 10s ease infinite;
      color: var(--text-main);
      overflow-x: hidden;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    header { padding: 50px 20px 30px; text-align: center; color: white; }
    header h1 { margin: 0; font-size: 36px; font-weight: 800; text-shadow: 0 4px 12px rgba(0,0,0,0.3); }
    
    .description { max-width: 600px; margin: 15px auto 0; font-size: 16px; opacity: 0.85; line-height: 1.6; }

    .app-wrapper { flex: 1; width: 100%; max-width: 650px; margin: 0 auto; padding: 0 20px 50px; }

    .card {
      background: var(--glass);
      backdrop-filter: blur(15px);
      border-radius: 24px;
      padding: 25px;
      margin-bottom: 20px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    h2 { margin: 0 0 20px; font-size: 20px; color: var(--primary); text-align: center; }

    .file-drop-area {
      border: 2px dashed #cbd5e1;
      border-radius: 16px;
      padding: 40px 20px;
      text-align: center;
      background: rgba(255, 255, 255, 0.5);
      cursor: pointer;
    }

    .tabs { display: flex; background: #f1f5f9; border-radius: 12px; padding: 4px; margin-bottom: 20px; }
    .tabs > div { flex: 1; text-align: center; padding: 10px; cursor: pointer; border-radius: 10px; font-weight: 700; font-size: 14px; }

    label { font-size: 14px; font-weight: 700; display: block; margin-top: 15px; color: #475569; }
    input[type="range"] { width: 100%; margin-top: 10px; accent-color: var(--primary); }

    .progress-container { margin: 25px 0; padding: 20px; background: #f8fafc; border-radius: 16px; border: 1px solid #e2e8f0; }
    .progress-bg { width: 100%; background: #e2e8f0; height: 12px; border-radius: 6px; overflow: hidden; }
    #progressBar { width: 0%; height: 100%; background: var(--primary); transition: width 0.3s ease; }
    #statusText { text-align: center; font-weight: 800; margin-bottom: 10px; color: var(--primary); }

    button {
      width: 100%; padding: 18px; border: none; border-radius: 16px;
      background: var(--primary); color: white; font-size: 16px; font-weight: 800; cursor: pointer;
    }

    /* Відео контейнер та стилі */
    #waveform { width: 100%; height: 120px; background: #000; border-radius: 12px; margin-top: 10px; }
    
    /* Контейнер для центрування відео */
    .video-container { display: flex; flex-direction: column; align-items: center; }

    video { 
      width: 40%; /* Початкова ширина 40% */
      max-width: 100%;
      border-radius: 16px; 
      background: #000; 
      margin: 10px auto; 
      display: block;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      transition: width 0.5s ease; /* Плавно розширюється */
    }

    /* Клас, який додасть твій script.js після обробки */
    video.processed {
      width: 100%;
    }
    
    /* Блок кнопок після обробки */
    .action-buttons {
      display: none; /* Сховано спочатку */
      width: 100%;
      gap: 10px;
      margin-bottom: 15px;
    }

    #downloadBtn {
      flex: 2;
      background: var(--success);
      color: white;
      text-align: center;
      text-decoration: none;
      padding: 15px;
      border-radius: 12px;
      font-weight: 800;
    }

    #resetBtn {
      flex: 1;
      background: #64748b;
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
    }

    .hidden-initially { display: none; }

    footer { padding: 30px; text-align: center; color: rgba(255,255,255,0.6); font-size: 13px; }
  </style>
</head>
<body>

<header>
  <h1>Pause Remover Pro</h1>
  <p class="description">Розумний інструмент для автоматичного вирізання тиші.</p>
</header>

<div class="app-wrapper">
  
  <div class="card">
    <h2>📂 Крок 1: Завантаження</h2>
    <div class="file-drop-area" onclick="document.getElementById('fileInput').click()">
      <input type="file" id="fileInput" accept="video/*" style="display:none">
      <p style="margin: 0; font-size: 14px; color: #64748b;">Натисніть сюди, щоб обрати файл</p>
    </div>
  </div>

  <div id="settingsCard" class="card hidden-initially">
    <h2>⚙️ Крок 2: Налаштування</h2>
    <div class="tabs">
      <div id="tabAuto" style="background: var(--primary); color: white;">Авто</div>
      <div id="tabManual">Вручну</div>
    </div>
    <div id="manualControls" style="display: none;">
      <label>Мінімальна тиша</label>
      <input type="range" id="duration" min="0.1" max="2.0" step="0.05" value="0.5">
    </div>
    <div id="autoInfo" style="padding: 15px; font-size: 14px; background: #eef2ff; border-radius: 12px; margin-bottom: 15px;">
      ✨ Режим Авто підбере налаштування сам.
    </div>
    <div class="progress-container" id="progCont">
      <div id="statusText">Готово</div>
      <div class="progress-bg"><div id="progressBar"></div></div>
    </div>
    <button id="processBtn">ЗАПУСТИТИ ОБРОБКУ</button>
  </div>

  <div id="waveformCard" class="card hidden-initially">
    <h2>📊 Аналіз звуку</h2>
    <canvas id="waveform"></canvas>
  </div>

  <div id="resultCard" class="card hidden-initially">
    <h2>🎬 Результат</h2>
    
    <div id="actionButtons" class="action-buttons">
        <a id="downloadBtn" download="no_pauses.mp4">📥 СКАЧАТИ</a>
        <button id="resetBtn" onclick="location.reload()">🔄 НОВЕ ВІДЕО</button>
    </div>

    <div class="video-container">
        <video id="preview" controls></video>
    </div>
  </div>

</div>

<footer>
  <p>© 2024 AI Video Tools Lab</p>
</footer>

<script>
  const fileInput = document.getElementById('fileInput');
  const settingsCard = document.getElementById('settingsCard');
  const waveformCard = document.getElementById('waveformCard');
  const resultCard = document.getElementById('resultCard');
  const preview = document.getElementById('preview');
  const actionButtons = document.getElementById('actionButtons');
  const downloadBtn = document.getElementById('downloadBtn');

  fileInput.addEventListener('change', () => {
    if (fileInput.files.length > 0) {
      settingsCard.style.display = 'block';
      waveformCard.style.display = 'block';
      resultCard.style.display = 'block';
      
      // Скидаємо ширину до 40%, якщо завантажуємо новий файл
      preview.classList.remove('processed');
      actionButtons.style.display = 'none';
    }
  });

  // ЦЯ ЧАСТИНА ДЛЯ ТЕБЕ:
  // У твоєму script.js, там де обробка FFmpeg завершується (фінальний етап),
  // тобі треба додати ці два рядки:
  // document.getElementById('preview').classList.add('processed');
  // document.getElementById('actionButtons').style.display = 'flex';
  // document.getElementById('downloadBtn').style.display = 'block';

  const tAuto = document.getElementById('tabAuto');
  const tManual = document.getElementById('tabManual');
  const mControls = document.getElementById('manualControls');
  const aInfo = document.getElementById('autoInfo');

  tAuto.onclick = () => {
    tAuto.style.background = 'var(--primary)'; tAuto.style.color = 'white';
    tManual.style.background = 'none'; tManual.style.color = 'inherit';
    mControls.style.display = 'none'; aInfo.style.display = 'block';
  };
  tManual.onclick = () => {
    tManual.style.background = 'var(--primary)'; tManual.style.color = 'white';
    tAuto.style.background = 'none'; tAuto.style.color = 'inherit';
    mControls.style.display = 'block'; aInfo.style.display = 'none';
  };
</script>

<script src="./ffmpeg/ffmpeg.min.js"></script>
<script src="script.js"></script>
</body>
</html>
