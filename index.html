<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pause Remover Pro</title>
  <style>
    :root { --primary: #2b6cff; --success: #00b894; --bg: #000; }
    
    body { 
      margin: 0; font-family: -apple-system, sans-serif; background: var(--bg); 
      display: flex; justify-content: center; color: #333; min-height: 100vh;
    }

    /* Анімований фон */
    .bg-circle {
      position: fixed; width: 500px; height: 500px;
      background: radial-gradient(circle, #1e3a8a 0%, rgba(0,0,0,0) 70%);
      border-radius: 50%; filter: blur(60px); z-index: -1;
      top: 10%; right: 10%;
    }

    .app { width: 100%; max-width: 600px; padding: 20px; z-index: 1; }
    
    /* Картки як у тебе, але з прозорістю */
    .card { 
      background: rgba(255, 255, 255, 0.95); border-radius: 16px; padding: 20px; 
      margin-bottom: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); 
    }

    h2 { text-align: center; margin-top: 0; color: var(--primary); }
    
    input[type="file"] { width: 100%; padding: 15px; border: 2px dashed #ccc; border-radius: 10px; cursor: pointer; background: #fff; }

    /* Оверлей прогресу */
    #fullOverlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.9); z-index: 9999; flex-direction: column;
      justify-content: center; align-items: center; color: white;
    }

    /* Відео 40% і по центру */
    .video-container { display: flex; justify-content: center; width: 100%; }
    video { width: 40% !important; border-radius: 12px; background: #000; }

    label { font-size: 14px; margin-top: 15px; display: block; font-weight: bold; }
    .slider-info { display: flex; justify-content: space-between; font-size: 13px; color: #666; margin-top: 4px; }
    input[type="range"] { width: 100%; margin-top: 8px; cursor: pointer; }
    
    #waveform { width: 100%; height: 120px; background: #fafafa; border-radius: 10px; border: 1px solid #eee; display: block; }
    
    button { width: 100%; padding: 15px; border: none; border-radius: 12px; background: var(--primary); color: white; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
    
    #downloadBtn { display: none; margin-top: 12px; text-align: center; padding: 15px; background: var(--success); color: white; text-decoration: none; border-radius: 12px; font-weight: bold; }

    /* Початкове приховування для краси (опційно) */
    #editorSection, #waveformSection, #videoSection { display: none; }
  </style>
</head>
<body>

<div class="bg-circle"></div>

<div id="fullOverlay">
    <h2 style="color:white">Обробка...</h2>
    <div id="ovPercent" style="font-size: 40px; font-weight: bold; margin: 10px;">0%</div>
    <div style="width: 80%; max-width: 400px; background: #333; height: 12px; border-radius: 6px; overflow: hidden;">
        <div id="ovBar" style="width: 0%; height: 100%; background: var(--primary); transition: 0.3s;"></div>
    </div>
    <div id="ovEta" style="margin-top: 15px; opacity: 0.8;">Осталось: -- сек</div>
</div>

<div class="app">
  <div class="card">
    <h2>Remove Pauses</h2>
    <input type="file" id="fileInput" accept="video/*">
  </div>

  <div class="card" id="editorSection">
    <div style="display: flex; background: #eee; border-radius: 10px; padding: 4px; margin-bottom: 15px;">
      <div id="tabAuto" style="flex: 1; text-align: center; padding: 8px; cursor: pointer; border-radius: 8px; background: var(--primary); color: white; font-weight: bold;">Авто</div>
      <div id="tabManual" style="flex: 1; text-align: center; padding: 8px; cursor: pointer; border-radius: 8px;">Вручную</div>
    </div>

    <div id="manualControls" style="display: none;">
      <label>Минимальная тишина</label>
      <input type="range" id="duration" min="0.1" max="2.0" step="0.05" value="0.5">
      <div class="slider-info"><span>Короткие паузы</span><span id="durationVal">0.5 сек</span></div>
      <label>Чувствительность (dB)</label>
      <input type="range" id="threshold" min="-60" max="-10" step="1" value="-35">
      <div class="slider-info"><span>Тише</span><span id="thresholdVal">-35 dB</span></div>
    </div>

    <div id="autoInfo" style="padding: 10px; font-size: 14px; background: #f0f7ff; border-radius: 10px; border: 1px solid #d0e0ff; margin-bottom: 10px;">
      ✨ Режим «Авто» подберет настройки под ваш звук.
    </div>

    <div class="progress-container" id="progCont">
      <div id="statusText">Ожидание...</div>
      <div class="progress-bg"><div id="progressBar"></div></div>
      <div id="etaText">Осталось: -- сек</div>
    </div>

    <button id="processBtn">Запустить обработку</button>
  </div>

  <div class="card" id="waveformSection">
    <canvas id="waveform"></canvas>
  </div>

  <div class="card" id="videoSection">
    <div class="video-container">
      <video id="preview" controls></video>
    </div>
    <a id="downloadBtn" download="no_pauses.mp4">Скачать готовое видео</a>
    <button id="newVideoBtn" style="background:#666; display:none;" onclick="location.reload()">Нове відео</button>
  </div>
</div>

<script src="./ffmpeg/ffmpeg.min.js"></script>
<script src="script.js"></script>

<script>
  // ЛОГІКА ДИЗАЙНУ
  const fInput = document.getElementById('fileInput');
  const overlay = document.getElementById('fullOverlay');
  
  // Елементи твого скрипта
  const pBar = document.getElementById('progressBar');
  const sText = document.getElementById('statusText');
  const eText = document.getElementById('etaText');
  const dBtn = document.getElementById('downloadBtn');

  // Показуємо все після вибору файлу
  fInput.onchange = () => {
    if(fInput.files.length > 0) {
      document.getElementById('editorSection').style.display = 'block';
      document.getElementById('waveformSection').style.display = 'block';
      document.getElementById('videoSection').style.display = 'block';
    }
  };

  // Спостерігач за обробкою
  const observer = new MutationObserver(() => {
    const percent = pBar.style.width;
    
    // Показуємо чорний оверлей тільки якщо обробка реально йде (від 1% до 99%)
    if (percent !== "" && percent !== "0%" && percent !== "100%") {
      overlay.style.display = 'flex';
      document.getElementById('ovBar').style.width = percent;
      document.getElementById('ovPercent').innerText = sText.innerText;
      document.getElementById('ovEta').innerText = eText.innerText;
    }

    // Якщо з'явилася кнопка скачати - обробка завершена
    if (window.getComputedStyle(dBtn).display === 'block') {
      overlay.style.display = 'none';
      document.getElementById('newVideoBtn').style.display = 'block';
      document.getElementById('editorSection').style.display = 'none';
    }
  });

  observer.observe(pBar, { attributes: true });
  observer.observe(dBtn, { attributes: true });

  // Виправлення візуального перемикання табів
  document.getElementById('tabAuto').addEventListener('click', () => {
    document.getElementById('tabAuto').style.background = 'var(--primary)';
    document.getElementById('tabAuto').style.color = 'white';
    document.getElementById('tabManual').style.background = 'none';
    document.getElementById('tabManual').style.color = '#333';
  });
  document.getElementById('tabManual').addEventListener('click', () => {
    document.getElementById('tabManual').style.background = 'var(--primary)';
    document.getElementById('tabManual').style.color = 'white';
    document.getElementById('tabAuto').style.background = 'none';
    document.getElementById('tabAuto').style.color = '#333';
  });
</script>

</body>
</html>
