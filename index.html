<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Remove Pauses</title>

<style>
:root {
  --primary: #2b6cff;
  --bg: #0b0f1a;
}

/* BODY */
body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  background: var(--bg);
  color: #fff;
}

/* APP */
.app {
  max-width: 700px;
  margin: auto;
  padding: 20px;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 15px;
}

/* HIDDEN */
.hidden {
  display: none;
}

/* HEADER */
.logo {
  font-weight: bold;
  margin-bottom: 15px;
  color: var(--primary);
}

/* FILE */
input[type="file"] {
  width: 100%;
  padding: 15px;
  border-radius: 12px;
  border: 1px dashed #444;
  background: transparent;
  color: #aaa;
}

/* TABS */
.tabs {
  display: flex;
  background: #111;
  border-radius: 10px;
  padding: 4px;
  margin-bottom: 15px;
}

.tab {
  flex: 1;
  text-align: center;
  padding: 10px;
  cursor: pointer;
  border-radius: 8px;
}

.tab.active {
  background: var(--primary);
  color: #fff;
}

/* SLIDER */
label {
  margin-top: 10px;
  display: block;
}

input[type="range"] {
  width: 100%;
}

.slider-info {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: #aaa;
}

/* BUTTON */
button {
  width: 100%;
  padding: 15px;
  border: none;
  border-radius: 12px;
  background: var(--primary);
  color: white;
  font-weight: bold;
  cursor: pointer;
}

/* WAVEFORM */
#waveform {
  width: 100%;
  height: 120px;
  background: #111;
  border-radius: 10px;
}

/* VIDEO */
.video-wrap {
  display: flex;
  justify-content: center;
}

video {
  width: 40%;
  min-width: 220px;
  border-radius: 12px;
  background: #000;
}

/* DOWNLOAD */
#downloadBtn {
  display: none;
  margin-top: 10px;
  padding: 12px;
  background: #00b894;
  text-align: center;
  border-radius: 10px;
  color: white;
  text-decoration: none;
}

/* PROGRESS */
.progress-container {
  margin-top: 15px;
  display: none;
}

.progress-bg {
  width: 100%;
  background: #222;
  height: 10px;
  border-radius: 6px;
}

#progressBar {
  height: 100%;
  width: 0%;
  background: var(--primary);
}
</style>
</head>

<body>

<div class="app">

<div class="logo">Remove pauses</div>

<!-- UPLOAD -->
<div class="card" id="uploadCard">
  <input type="file" id="fileInput" accept="video/*">
</div>

<!-- SETTINGS -->
<div class="card hidden" id="settingsCard">

  <div class="tabs">
    <div id="tabAuto" class="tab active">Авто</div>
    <div id="tabManual" class="tab">Ручной</div>
  </div>

  <div id="manualControls" style="display:none;">
    <label>Минимальная тишина</label>
    <input type="range" id="duration" min="0.1" max="2.0" step="0.05" value="0.5">
    <div class="slider-info"><span></span><span id="durationVal">0.5 сек</span></div>

    <label>Чувствительность</label>
    <input type="range" id="threshold" min="-60" max="-10" step="1" value="-35">
    <div class="slider-info"><span></span><span id="thresholdVal">-35 dB</span></div>
  </div>

  <div id="autoInfo">Авто режим подбирает параметры</div>

  <div class="progress-container" id="progCont">
    <div id="statusText">Ожидание...</div>
    <div class="progress-bg"><div id="progressBar"></div></div>
    <div id="etaText">--</div>
  </div>

  <button id="processBtn">Обработать</button>
</div>

<!-- WAVEFORM -->
<div class="card hidden" id="waveCard">
  <canvas id="waveform"></canvas>
</div>

<!-- VIDEO -->
<div class="card hidden" id="videoCard">
  <div class="video-wrap">
    <video id="preview" controls></video>
  </div>

  <a id="downloadBtn" download="no_pauses.mp4">Скачать</a>
  <button onclick="location.reload()">Новое видео</button>
</div>

</div>

<script src="./ffmpeg/ffmpeg.min.js"></script>
<script src="script.js"></script>

<script>
/* ================= UI ЛОГИКА (НЕ ЛОМАЕТ SCRIPT.JS) ================= */

const fileInput = document.getElementById("fileInput");
const settingsCard = document.getElementById("settingsCard");
const waveCard = document.getElementById("waveCard");
const videoCard = document.getElementById("videoCard");

/* Показ блоков після загрузки */
fileInput.addEventListener("change", () => {
  settingsCard.classList.remove("hidden");
  waveCard.classList.remove("hidden");
  videoCard.classList.remove("hidden");
});

/* вкладки (той же id що у тебе) */
const tabAuto = document.getElementById("tabAuto");
const tabManual = document.getElementById("tabManual");
const manualControls = document.getElementById("manualControls");
const autoInfo = document.getElementById("autoInfo");

tabAuto.onclick = () => {
  tabAuto.classList.add("active");
  tabManual.classList.remove("active");
  manualControls.style.display = "none";
  autoInfo.style.display = "block";
};

tabManual.onclick = () => {
  tabManual.classList.add("active");
  tabAuto.classList.remove("active");
  manualControls.style.display = "block";
  autoInfo.style.display = "none";
};
</script>

</body>
</html>
