<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pause Remover Pro</title>
    <style>
        :root { --p-clr: #2b6cff; --s-clr: #00b894; --b-clr: #050505; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            background: var(--b-clr); color: #fff; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; padding-top: 80px;
        }
        .f_head {
            width: 100%; height: 60px; position: fixed; top: 0; left: 0; z-index: 100;
            background: rgba(255,255,255,0.95); backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: center; border-bottom: 1px solid #ddd;
        }
        .logo { color: #000; font-weight: bold; text-decoration: none; font-size: 18px; }
        .main_app { width: 100%; max-width: 450px; padding: 0 15px; }
        .card { 
            background: #fff; border-radius: 20px; padding: 20px; 
            margin-bottom: 20px; color: #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .btn_file { 
            width: 100%; padding: 40px 10px; border: 2px dashed #ccc; border-radius: 15px; 
            background: #f9f9f9; text-align: center; cursor: pointer; color: #666; font-weight: bold;
        }
        #ov_loading {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 9999; flex-direction: column;
            justify-content: center; align-items: center;
        }
        .p_bar { width: 250px; height: 6px; background: #333; border-radius: 3px; margin: 15px 0; overflow: hidden; }
        #p_fill { width: 0%; height: 100%; background: var(--p-clr); transition: width 0.2s; }
        .tabs { display: flex; background: #eee; border-radius: 10px; padding: 4px; margin-bottom: 15px; }
        .tab { flex: 1; text-align: center; padding: 8px; cursor: pointer; border-radius: 8px; font-size: 13px; font-weight: bold; }
        .active { background: var(--p-clr); color: white; }
        canvas { width: 100%; height: 80px; background: #fdfdfd; border-radius: 8px; border: 1px solid #eee; margin: 10px 0; }
        .btn_go { width: 100%; padding: 15px; border: none; border-radius: 12px; background: var(--p-clr); color: white; font-weight: bold; font-size: 16px; }
        video { width: 100%; border-radius: 10px; margin-top: 10px; background: #000; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<header class="f_head"><a href="#" class="logo">PauseRemover<span>AI</span></a></header>

<div id="ov_loading">
    <div id="ov_pct" style="font-size: 40px; font-weight: 800;">0%</div>
    <div id="ov_msg" style="font-size: 14px; margin-top: 10px;">Обробка...</div>
    <div class="p_bar"><div id="p_fill"></div></div>
</div>

<div class="main_app">
    <div id="step1" class="card">
        <h2 style="margin-top:0; text-align:center; color:var(--p-clr)">Завантажте відео</h2>
        <div class="btn_file" onclick="document.getElementById('fin').click()">
            <span style="font-size:30px">📁</span><br>Натисніть для вибору
            <input type="file" id="fin" accept="video/*" style="display:none">
        </div>
    </div>

    <div id="step2" class="card hidden">
        <div class="tabs">
            <div id="t_a" class="tab active">Авто</div>
            <div id="t_m" class="tab">Ручне</div>
        </div>
        <div id="m_ui" class="hidden">
            <input type="range" id="r_db" min="-50" max="-20" value="-35" style="width:100%">
            <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:10px">
                <span>Чутливість</span><span id="v_db">-35 dB</span>
            </div>
        </div>
        <canvas id="cvs"></canvas>
        <button id="run" class="btn_go">Почати монтаж</button>
    </div>

    <div id="step3" class="card hidden">
        <video id="v_res" controls></video>
        <a id="btn_dl" download="result.mp4" class="btn_go" style="display:block; text-decoration:none; text-align:center; margin-top:15px; background:var(--s-clr)">Зберегти відео</a>
        <button onclick="location.reload()" style="width:100%; margin-top:10px; border:none; background:none; color:#666">Інше відео</button>
    </div>
</div>

<script src="./ffmpeg/ffmpeg.min.js"></script>
<script src="script.js"></script>
</body>
</html>
