<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Remove Pauses</title>

<style>
* { box-sizing: border-box; }

:root {
  --primary: #2b6cff;
  --bg: #0b0f1a;
}

body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  background: var(--bg);
  color: #fff;
}

/* APP */
.app {
  max-width: 700px;
  margin: auto;
  padding: 20px;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.05);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 15px;
}

/* HIDDEN */
.hidden { display: none; }

/* INPUT */
input[type="file"] {
  width: 100%;
  padding: 15px;
  border: 1px dashed #444;
  border-radius: 10px;
  background: transparent;
  color: #aaa;
}

/* TABS */
.tabs {
  display: flex;
  background: #111;
  border-radius: 10px;
  padding: 4px;
}

.tab {
  flex: 1;
  text-align: center;
  padding: 10px;
  cursor: pointer;
  border-radius: 8px;
}

.active {
  background: var(--primary);
}

/* SLIDER */
input[type="range"] {
  width: 100%;
}

.slider-info {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
}

/* VIDEO */
.video-wrap {
  display: flex;
  justify-content: center;
}

video {
  width: 40%;
  min-width: 220px;
}

/* WAVE */
#waveform {
  width: 100%;
  height: 120px;
  background: #111;
}

/* OVERLAY */
#overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  z-index: 999;
}

.loader {
  width: 60px;
  height: 60px;
  border: 4px solid #333;
  border-top: 4px solid #2b6cff;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin-bottom: 20px;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.progress-bg {
  width: 300px;
  height: 10px;
  background: #222;
}

#progressBar {
  height: 100%;
  width: 0%;
  background: var(--primary);
}
</style>
</head>

<body>

<!-- OVERLAY -->
<div id="overlay">
  <div class="loader"></div>
  <div id="statusText">Обработка...</div>
  <div class="progress-bg"><div id="progressBar"></div></div>
  <div id="etaText"></div>
</div>

<div class="app">

<!-- UPLOAD -->
<div class="card" id="uploadCard">
  <input type="file" id="fileInput" accept="video/*">
</div>

<!-- SETTINGS -->
<div class="card hidden" id="settingsCard">

<div class="tabs">
  <div id="tabAuto" class="tab active">Авто</div>
  <div id="tabManual" class="tab">Ручной</div>
</div>

<div id="manualControls" style="display:none;">
  <input type="range" id="duration" min="0.1" max="2" step="0.05" value="0.5">
  <div class="slider-info"><span></span><span id="durationVal">0.5</span></div>

  <input type="range" id="threshold" min="-60" max="-10" step="1" value="-35">
  <div class="slider-info"><span></span><span id="thresholdVal">-35</span></div>
</div>

<div id="autoInfo">Авто режим</div>

<button id="processBtn">Обработать</button>

</div>

<!-- WAVE -->
<div class="card hidden" id="waveCard">
  <canvas id="waveform"></canvas>
</div>

<!-- VIDEO -->
<div class="card hidden" id="videoCard">
  <div class="video-wrap">
    <video id="preview" controls></video>
  </div>
  <a id="downloadBtn">Скачать</a>
</div>

</div>

<script src="./ffmpeg/ffmpeg.min.js"></script>
<script src="script.js"></script>

<script>
const fileInput = document.getElementById("fileInput");
const settingsCard = document.getElementById("settingsCard");
const waveCard = document.getElementById("waveCard");
const videoCard = document.getElementById("videoCard");
const overlay = document.getElementById("overlay");

/* ПОКАЗ ПОСЛЕ ЗАГРУЗКИ */
fileInput.addEventListener("change", () => {
  settingsCard.classList.remove("hidden");
  waveCard.classList.remove("hidden");
  videoCard.classList.remove("hidden");

  /* КРИТИЧНО: ПЕРЕРИСОВКА */
  setTimeout(() => {
    if (typeof drawWaveform === "function") drawWaveform();
  }, 100);
});

/* OVERLAY */
const originalClick = document.getElementById("processBtn").onclick;
document.getElementById("processBtn").onclick = async function(e) {
  overlay.style.display = "flex";
  if (originalClick) await originalClick(e);
  overlay.style.display = "none";
};
</script>

</body>
</html>
