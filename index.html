<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pause Remover Pro - iPhone Compatible</title>
    <style>
        :root { --p-clr: #2b6cff; --s-clr: #00b894; --b-clr: #050505; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--b-clr); color: #fff; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            padding-top: 80px; overflow-x: hidden;
        }
        .bg_anim { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: #000; }
        .blob { position: absolute; width: 500px; height: 500px; background: radial-gradient(circle, rgba(43,108,255,0.3) 0%, rgba(0,0,0,0) 70%); border-radius: 50%; filter: blur(60px); animation: move 8s infinite alternate ease-in-out; }
        @keyframes move { 0% { transform: translate(-10%, -10%); } 100% { transform: translate(20%, 20%); } }

        .main_app_v3 { width: 100%; max-width: 600px; padding: 0 20px; z-index: 10; }
        .card_main { background: #fff; border-radius: 24px; padding: 25px; margin-bottom: 30px; color: #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { text-align: center; margin-top: 0; color: var(--p-clr); }
        
        .f_inp_88 { width: 100%; padding: 40px 20px; border: 3px dashed #e0e0e0; border-radius: 16px; cursor: pointer; text-align: center; background: #f9f9f9; color: #888; font-weight: bold; }
        
        #ov_scr_55 { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; flex-direction: column; justify-content: center; align-items: center; }
        .p_bar_bg { width: 80%; height: 10px; background: #333; border-radius: 5px; margin: 20px 0; overflow: hidden; }
        #p_bar_fill { width: 0%; height: 100%; background: var(--p-clr); transition: width 0.3s; }

        .tabs_row { display: flex; background: #f0f0f0; border-radius: 12px; padding: 5px; margin-bottom: 15px; }
        .tab_btn { flex: 1; text-align: center; padding: 10px; cursor: pointer; border-radius: 8px; font-weight: bold; color: #666; }
        .active_t { background: var(--p-clr); color: white; }
        
        .btn_prim { width: 100%; padding: 16px; border: none; border-radius: 14px; background: var(--p-clr); color: white; font-size: 16px; font-weight: bold; cursor: pointer; }
        #wv_cvs_11 { width: 100%; height: 100px; background: #fafafa; border: 1px solid #eee; border-radius: 10px; margin: 10px 0; }
        .hidden_node { display: none !important; }
        video { width: 100%; border-radius: 12px; background: #000; }
    </style>
</head>
<body>

<div class="bg_anim"><div class="blob"></div></div>

<div id="ov_scr_55">
    <h2 style="color:white">Обробка відео...</h2>
    <div id="ov_pct" style="font-size: 48px; font-weight: 900; color: var(--p-clr);">0%</div>
    <div class="p_bar_bg"><div id="p_bar_fill"></div></div>
    <div id="ov_eta" style="color: #aaa;">Не закривайте вкладку</div>
</div>

<div class="main_app_v3">
    <div id="step_file" class="card_main">
        <h2>Pause Remover Pro</h2>
        <div class="f_inp_88" onclick="document.getElementById('real_f').click()">
            <div style="font-size:40px;">📁</div>
            Обрати відео з галереї
            <input type="file" id="real_f" accept="video/*" style="display:none">
        </div>
    </div>

    <div id="step_editor" class="card_main hidden_node">
        <div class="tabs_row">
            <div id="t_auto" class="tab_btn active_t">Авто</div>
            <div id="t_manual" class="tab_btn">Ручна</div>
        </div>
        <div id="m_cntrls" class="hidden_node">
            <label>Поріг (dB): <span id="txt_db">-35</span></label>
            <input type="range" id="val_db" min="-60" max="-10" value="-35" style="width:100%">
        </div>
        <canvas id="wv_cvs_11"></canvas>
        <button id="go_proc" class="btn_prim">Почати монтаж</button>
    </div>

    <div id="step_result" class="card_main hidden_node">
        <video id="vid_pre_77" controls playsinline></video>
        <a id="dl_btn_99" style="display:none; margin-top:15px; text-decoration:none;" class="btn_prim">Зберегти результат</a>
        <button class="btn_prim" style="background:#666; margin-top:10px;" onclick="location.reload()">Нове відео</button>
    </div>
</div>

<script src="./ffmpeg/ffmpeg.min.js"></script>
<script src="script.js"></script>
</body>
</html>
