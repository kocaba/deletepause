<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pause Remover Pro</title>
  <style>
    :root { --primary: #2b6cff; --success: #00b894; --bg: #000; }
    
    * { box-sizing: border-box; }

    body { 
      margin: 0; font-family: -apple-system, sans-serif; background: var(--bg); 
      display: flex; justify-content: center; color: #333; min-height: 100vh;
      overflow-x: hidden; position: relative;
    }

    /* Анімований фон */
    .bg-circle {
      position: fixed; width: 600px; height: 600px;
      background: radial-gradient(circle, #1e3a8a 0%, rgba(0,0,0,0) 70%);
      border-radius: 50%; filter: blur(80px); z-index: -1;
      animation: move 12s infinite alternate ease-in-out;
    }
    @keyframes move { from { transform: translate(-20%, 10%); } to { transform: translate(70%, 60%); } }

    .app { width: 100%; max-width: 600px; padding: 20px; z-index: 1; }
    
    .card { 
      background: rgba(255, 255, 255, 0.95); border-radius: 20px; padding: 20px; 
      margin-bottom: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      width: 100%;
    }

    /* Оверлей обробки */
    #fullProgressOverlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.9); z-index: 2000; flex-direction: column;
      justify-content: center; align-items: center; color: white; text-align: center;
    }

    /* Стиль для кнопки файлу */
    #fileInput { 
      width: 100%; padding: 15px; border: 2px dashed #ccc; border-radius: 12px; 
      cursor: pointer; background: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* Відео 40% */
    .video-container { display: flex; justify-content: center; width: 100%; }
    video { width: 40% !important; border-radius: 12px; background: #000; margin-top: 10px; }

    /* Дизайн табів (використовуємо твої ID) */
    #tabAuto, #tabManual { transition: 0.3s; border: 1px solid transparent; }
    
    #waveform { width: 100%; height: 120px; background: #eee; border-radius: 10px; border: 1px solid #ddd; display: block; }
    
    button { width: 100%; padding: 15px; border: none; border-radius: 12px; background: var(--primary); color: white; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    
    #downloadBtn { display: none; margin-top: 12px; text-align: center; padding: 15px; background: var(--success); color: white; text-decoration: none; border-radius: 12px; font-weight: bold; }

    /* Поетапне приховування */
    #main-ui, #result-ui { display: none; }
  </style>
</head>
<body>

<div class="bg-circle"></div>

<div id="fullProgressOverlay">
    <h2 style="color:white">Обробка відео...</h2>
    <div id="overlayStatusText" style="font-size: 40px; font-weight: bold; margin: 10px;">0%</div>
    <div style="width: 80%; max-width: 400px; background: #333; height: 12px; border-radius: 6px; overflow: hidden;">
        <div id="overlayProgressBar" style="width: 0%; height: 100%; background: var(--primary); transition: 0.3s;"></div>
    </div>
    <div id="overlayEtaText" style="margin-top: 15px; opacity: 0.8;">Осталось: -- сек</div>
</div>

<div class="app">
  <div class="card" id="step1">
    <h2 style="color: var(--primary)">Pause Remover</h2>
    <input type="file" id="fileInput" accept="video/*">
  </div>

  <div id="main-ui">
    <div class="card">
      <div style="display: flex; background: #eee; border-radius: 10px; padding: 4px; margin-bottom: 15px;">
        <div id="tabAuto" style="flex: 1; text-align: center; padding: 8px; cursor: pointer; border-radius: 8px; background: var(--primary); color: white; font-weight: bold;">Авто</div>
        <div id="tabManual" style="flex: 1; text-align: center; padding: 8px; cursor: pointer; border-radius: 8px;">Вручную</div>
      </div>

      <div id="manualControls" style="display: none;">
        <label>Минимальная тишина</label>
        <input type="range" id="duration" min="0.1" max="2.0" step="0.05" value="0.5">
        <div class="slider-info"><span>Короткие паузы</span><span id="durationVal">0.5 сек</span></div>
        <label>Чувствительность (dB)</label>
        <input type="range" id="threshold" min="-60" max="-10" step="1" value="-35">
        <div class="slider-info"><span>Тише</span><span id="thresholdVal">-35 dB</span></div>
      </div>

      <div id="autoInfo" style="padding: 10px; font-size: 14px; background: #f0f7ff; border-radius: 10px; border: 1px solid #d0e0ff; margin-bottom: 10px;">
        ✨ Режим «Авто» подберет настройки под ваш звук.
      </div>

      <label>Анализ звука:</label>
      <canvas id="waveform"></canvas>

      <div class="progress-container" id="progCont" style="display: none;">
        <div id="statusText">Ожидание...</div>
        <div id="progressBar" style="width:0%"></div>
        <div id="etaText"></div>
      </div>

      <button id="processBtn">Запустить обработку</button>
    </div>
  </div>

  <div id="result-ui">
    <div class="card">
      <div class="video-container">
        <video id="preview" controls></video>
      </div>
      <a id="downloadBtn" download="no_pauses.mp4">Скачать готовое видео</a>
      <button style="background: #666; margin-top: 10px;" onclick="location.reload()">Новое видео</button>
    </div>
  </div>
</div>

<script src="./ffmpeg/ffmpeg.min.js"></script>
<script src="script.js"></script>

<script>
  // Логіка відображення
  const fileInput = document.getElementById('fileInput');
  const step1 = document.getElementById('step1');
  const mainUI = document.getElementById('main-ui');
  const resultUI = document.getElementById('result-ui');
  const overlay = document.getElementById('fullProgressOverlay');

  // 1. При виборі файлу
  fileInput.addEventListener('change', () => {
    if (fileInput.files.length > 0) {
      step1.style.display = 'none';
      mainUI.style.display = 'block';
    }
  });

  // 2. Синхронізація оверлею з твоїм прогрес-баром
  const realBar = document.getElementById('progressBar');
  const realStatus = document.getElementById('statusText');
  const realEta = document.getElementById('etaText');
  const realProgCont = document.getElementById('progCont');
  const downloadBtn = document.getElementById('downloadBtn');

  const observer = new MutationObserver(() => {
    // Якщо твій скрипт показав прогрес-бар — показуємо оверлей
    if (window.getComputedStyle(realProgCont).display !== 'none') {
        overlay.style.display = 'flex';
        document.getElementById('overlayProgressBar').style.width = realBar.style.width;
        document.getElementById('overlayStatusText').innerText = realStatus.innerText;
        document.getElementById('overlayEtaText').innerText = realEta.innerText;
    }
    
    // Якщо з'явилася кнопка скачати — ховаємо оверлей і показуємо результат
    if (window.getComputedStyle(downloadBtn).display === 'block') {
        overlay.style.display = 'none';
        mainUI.style.display = 'none';
        resultUI.style.display = 'block';
    }
  });

  observer.observe(realBar, { attributes: true });
  observer.observe(realProgCont, { attributes: true });
  observer.observe(downloadBtn, { attributes: true });

  // 3. Візуальне перемикання табів (щоб не ламати твій script.js)
  const tabA = document.getElementById('tabAuto');
  const tabM = document.getElementById('tabManual');
  
  tabA.addEventListener('click', () => {
    tabA.style.background = 'var(--primary)'; tabA.style.color = 'white';
    tabM.style.background = 'none'; tabM.style.color = '#333';
  });
  tabM.addEventListener('click', () => {
    tabM.style.background = 'var(--primary)'; tabM.style.color = 'white';
    tabA.style.background = 'none'; tabA.style.color = '#333';
  });
</script>

</body>
</html>
